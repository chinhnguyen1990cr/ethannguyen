<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E1218">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ethan Nguyб»…n</title>
<style>
  :root{
    --bg:#0E1218; --panel:#171E27; --panel2:#1D2531; --border:#2A3341;
    --text:#EDF2F7; --dim:#8B96A8; --dim2:#5C6779;
    --gold:#FFC94A; --orange:#FF8A3D; --blue:#4FA8FF; --teal:#2CDBA8; --red:#FF5A6E;
    --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{display:flex; justify-content:center; min-height:100vh;
    background:radial-gradient(circle at 50% -10%, #1A2333 0%, var(--bg) 55%);}
  #shell{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column;
    position:relative; padding-bottom:calc(24px + env(safe-area-inset-bottom));}

  #hud{padding:calc(16px + env(safe-area-inset-top)) 18px 14px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--border); background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);}
  .brand{display:flex; flex-direction:column; flex:1; min-width:0;}
  .brand .name{font-size:14px; font-weight:800; letter-spacing:0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .brand .date{font-size:11px; color:var(--dim); font-family:var(--mono); margin-top:1px;}
  .emblem{width:40px;height:40px;border-radius:12px; display:flex;align-items:center;justify-content:center;
    font-size:20px; flex-shrink:0; cursor:pointer; overflow:hidden; position:relative;}
  .emblem img{width:100%; height:100%; object-fit:cover;}
  .emblem .edit-dot{position:absolute; bottom:-2px; right:-2px; width:14px;height:14px; border-radius:50%;
    background:var(--gold); border:2px solid var(--bg); font-size:8px; display:flex; align-items:center; justify-content:center;}
  .streak{display:flex; align-items:center; gap:4px; background:var(--panel2); border:1px solid var(--border);
    padding:6px 9px; border-radius:11px; flex-shrink:0;}
  .streak .fl{font-size:14px;} .streak .n{font-family:var(--mono); font-weight:800; font-size:13px;}
  .bellbtn{width:34px;height:34px;border-radius:10px; background:var(--panel2); border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center; font-size:15px; flex-shrink:0; cursor:pointer;}
  .bellbtn.on{background:linear-gradient(145deg,#3a2f16,#2a2210); border-color:#6b5620; color:var(--gold);}

  #xpwrap{padding:0 18px 14px; border-bottom:1px solid var(--border);}
  #xpbar-track{height:6px; border-radius:6px; background:var(--panel2); overflow:hidden; margin-top:2px;}
  #xpbar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--gold),#FFE08A); transition:width .5s cubic-bezier(.2,.9,.3,1);}
  .xplabel{display:flex; justify-content:space-between; font-size:10.3px; color:var(--dim); font-family:var(--mono); margin-top:6px;}

  #content{flex:1; padding:16px 16px 24px;}
  .seg{display:flex; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:3px; gap:3px; margin-bottom:16px;}
  .seg button{flex:1; border:none; background:transparent; color:var(--dim); font-family:var(--sans);
    font-size:12px; font-weight:700; padding:8px 2px; border-radius:9px; cursor:pointer;}
  .seg button.active{background:linear-gradient(135deg,var(--gold),#FF8A3D); color:#171208; box-shadow:0 3px 10px rgba(255,201,74,0.35);}

  .ringcard{background:radial-gradient(120% 140% at 50% -20%, #1B2434 0%, var(--panel) 60%);
    border:1px solid var(--border); border-radius:20px; padding:22px 18px 18px;
    display:flex; flex-direction:column; align-items:center; margin-bottom:14px;}
  .ringcard.pulse{ animation: pulseGlow 900ms ease; }
  @keyframes pulseGlow{0%{box-shadow:0 0 0 0 rgba(255,201,74,0);}30%{box-shadow:0 0 40px 6px rgba(255,201,74,.35);}100%{box-shadow:0 0 0 0 rgba(255,201,74,0);}}
  #rings-svg{width:180px; height:180px;}
  .ring-bg{fill:none; stroke:var(--panel2); stroke-width:11;}
  .ring-fg{fill:none; stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset .7s cubic-bezier(.2,.9,.3,1);}
  .ring-center{font-family:var(--mono);}
  .ring-center .big{font-size:24px; font-weight:800; fill:var(--text);}
  .ring-center .small{font-size:9px; fill:var(--dim); letter-spacing:.05em;}
  .legend{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:14px;}
  .leg-item{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:6px 12px; border-radius:20px;}
  .leg-dot{width:8px;height:8px;border-radius:50%;}
  .leg-item b{font-family:var(--mono);}

  .rest-banner{background:linear-gradient(145deg,#1c2536,#171e27); border:1px dashed var(--border);
    border-radius:14px; padding:12px 14px; margin-bottom:14px; font-size:12px; color:var(--dim); text-align:center;}

  .dayoff-toggle{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:10px 14px; margin-bottom:14px; cursor:pointer; font-size:12px; color:var(--dim); font-weight:600;}
  .dayoff-toggle.active{background:linear-gradient(145deg,#16241f,#171e27); border-color:var(--teal); color:var(--teal);}
  .dayoff-toggle span:first-child{font-size:16px;}
  .rest-day-card{background:radial-gradient(120% 140% at 50% -20%, #1B2434 0%, var(--panel) 60%); border:1px solid var(--border); border-radius:20px;}

  .add-task-btn{width:100%; background:var(--panel); border:1px dashed var(--border); color:var(--dim);
    font-size:12.5px; font-weight:700; padding:13px; border-radius:14px; cursor:pointer; margin-top:8px;}
  .reset-today-btn{width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--gold);
    font-size:11.5px; font-weight:700; padding:11px; border-radius:12px; cursor:pointer; margin-top:8px;}
  .form-input{width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    font-size:13px; padding:10px 12px; border-radius:10px; font-family:var(--sans);}
  .form-input::placeholder{color:var(--dim2);}
  .form-btn{flex:1; border:none; padding:11px; border-radius:10px; font-size:12.5px; font-weight:700; cursor:pointer;}
  .form-btn.submit{background:linear-gradient(90deg,var(--gold),#FFE08A); color:#0E1218;}
  .form-btn.cancel{background:var(--panel2); color:var(--dim); border:1px solid var(--border);}

  .rm{width:20px;height:20px;border-radius:6px; display:flex; align-items:center; justify-content:center;
    color:var(--dim2); font-size:10px; flex-shrink:0; margin-left:2px;}
  .restore-row{margin-top:10px; display:flex; flex-wrap:wrap; gap:6px;}

  .tasklist{display:flex; flex-direction:column; gap:8px;}
  .task-wrap{background:var(--panel); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  .task-wrap.done{border-color:#333f52;}
  .task-wrap.overdue{border-color:#5a2f38;}
  .task-wrap.failed{border-color:#7a2b2b; background:rgba(122,43,43,0.08);}
  .task-wrap.failed .lbl{color:#C97575;}
  .fail-tag{font-size:9.5px; font-weight:700; color:#FF6B6B; background:rgba(255,107,107,0.14); border:1px solid rgba(255,107,107,0.35); border-radius:6px; padding:1px 6px; letter-spacing:.2px;}
  .task{display:flex; align-items:center; gap:11px; padding:12px 12px; cursor:pointer; user-select:none;}
  .task .time{font-family:var(--mono); font-size:10.5px; color:var(--dim); width:52px; flex-shrink:0; line-height:1.3;}
  .task .time .end{color:var(--dim2); font-size:9.5px;}
  .task .catdot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
  .task .lbl{flex:1; font-size:13px; font-weight:600; min-width:0; display:flex; align-items:center; gap:6px;}
  .task-wrap.done .lbl{color:var(--dim); text-decoration:line-through; text-decoration-color:var(--dim2); font-weight:500;}
  .chev{font-size:10px; color:var(--dim2); transition:transform .2s; flex-shrink:0;}
  .chev.open{transform:rotate(90deg);}
  .chk{width:23px;height:23px;border-radius:8px; border:2px solid var(--dim2); flex-shrink:0;
    display:flex;align-items:center;justify-content:center; transition:all .2s;}
  .task-wrap.done .chk{background:var(--teal); border-color:var(--teal);}
  .task-wrap.failed .chk{background:#FF6B6B; border-color:#FF6B6B;}
  .chk svg{width:13px;height:13px; opacity:0; transform:scale(.5); transition:all .15s;}
  .task-wrap.done .chk svg{opacity:1; transform:scale(1);}
  .task-wrap.failed .chk svg{opacity:1; transform:scale(1);}
  .subpanel{max-height:0; overflow:hidden; transition:max-height .4s ease;}
  .subpanel.open{max-height:1400px;}
  .subinner{padding:2px 14px 16px 14px;}
  .sublist{margin:0 0 10px; padding-left:16px; display:flex; flex-direction:column; gap:5px;}
  .sublist li{font-size:11.8px; color:#B7C0CD; line-height:1.4;}
  .video-btn{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700;
    color:#0E1218; background:linear-gradient(90deg,var(--gold),#FFE08A); padding:7px 12px; border-radius:9px;
    text-decoration:none; margin-top:2px;}
  .link-chip{display:inline-flex; align-items:center; gap:5px; font-size:10.8px; font-weight:600;
    color:var(--dim); background:var(--panel2); border:1px solid var(--border); padding:5px 10px; border-radius:8px;
    text-decoration:none; margin:2px 4px 2px 0;}

  .exercise-card{display:flex; gap:10px; align-items:center; background:var(--panel2); border:1px solid var(--border);
    border-radius:12px; padding:8px 10px; margin-bottom:7px;}
  .exercise-pic{width:38px;height:38px; flex-shrink:0; color:var(--gold);}
  .exercise-info{flex:1; min-width:0;}
  .exercise-name{font-size:12px; font-weight:700; color:var(--text);}
  .exercise-sr{font-size:10.5px; color:var(--dim); font-family:var(--mono); margin-top:1px;}
  .exercise-video{flex-shrink:0; width:30px;height:30px; border-radius:9px; background:linear-gradient(145deg,var(--gold),#c99a2e);
    display:flex;align-items:center;justify-content:center; text-decoration:none; font-size:12px; color:#171208;}

  .ipa-note{font-size:11.5px; color:var(--gold); background:rgba(255,201,74,0.08); border:1px solid rgba(255,201,74,0.25);
    padding:8px 10px; border-radius:10px; margin-bottom:10px;}
  .task-remind-banner{font-size:11.5px; font-weight:700; padding:9px 11px; border-radius:10px; margin-bottom:10px; line-height:1.5;}
  .task-remind-banner.upcoming{color:var(--gold); background:rgba(255,201,74,0.10); border:1px solid rgba(255,201,74,0.28);}
  .task-remind-banner.late{color:var(--red); background:rgba(255,90,110,0.10); border:1px solid rgba(255,90,110,0.3);}
  .ipa-progress{font-size:10.5px; color:var(--dim); margin-bottom:8px; font-family:var(--mono);}
  .ipa-group-title{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim2); margin:8px 0 6px;}
  .ipa-grid{display:flex; flex-wrap:wrap; gap:6px;}
  .ipa-chip{display:flex; flex-direction:column; align-items:center; gap:1px; min-width:44px;
    background:var(--panel); border:1px solid var(--border); border-radius:9px; padding:5px 4px; cursor:pointer;}
  .ipa-chip .sym{font-family:var(--mono); font-size:12px; font-weight:700;}
  .ipa-chip .wd{font-size:8px; color:var(--dim2);}
  .ipa-chip.learned{background:linear-gradient(145deg,#1d3d34,#16281f); border-color:var(--teal);}
  .ipa-chip.learned .sym{color:var(--teal);}

  .level-seg{display:flex; gap:6px; margin-bottom:10px;}
  .level-seg button{flex:1; font-size:10.5px; font-weight:700; padding:7px 4px; border-radius:8px;
    background:var(--panel2); border:1px solid var(--border); color:var(--dim); cursor:pointer;}
  .level-seg button.active{background:linear-gradient(135deg,var(--blue),#2568b0); color:#fff; border-color:transparent; box-shadow:0 3px 10px rgba(79,168,255,0.35);}
  .suggest-box{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .suggest-box .sg-lbl{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim2); margin-bottom:3px;}
  .suggest-box .sg-topic{font-size:12.5px; font-weight:700; color:var(--text);}

  .advice{background:linear-gradient(145deg,#1C2536,#171E27); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px;}
  .advice .hdr{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .advice .hdr .ic{font-size:16px;} .advice .hdr .t{font-size:12px; font-weight:800; letter-spacing:.04em; color:var(--gold); text-transform:uppercase;}
  .advice p{margin:0 0 6px; font-size:13px; line-height:1.55; color:#D7DEE8;} .advice p:last-child{margin-bottom:0;}

  .card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px;}
  .card h3{margin:0 0 12px; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim);}
  .rowbtns{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .rowbtns .navbtn{background:var(--panel2); border:1px solid var(--border); color:var(--text); width:30px;height:30px;border-radius:9px; font-size:14px; cursor:pointer;}
  .rowbtns .lbl{font-family:var(--mono); font-weight:700; font-size:13.5px;}

  .weekbars{display:flex; align-items:flex-end; gap:8px; height:170px; padding:0 4px;}
  .wbar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .wbar-pct{font-size:11px; font-weight:800;}
  .wbar-track{position:relative; width:100%; max-width:28px; height:110px; border-radius:999px; display:flex; align-items:flex-end; overflow:hidden;}
  .wbar-fill{width:100%; border-radius:999px; position:relative; transition:height .5s cubic-bezier(.2,.9,.3,1); min-height:8px;}
  .wbar-fill::after{content:''; position:absolute; top:3px; left:50%; transform:translateX(-50%); width:58%; height:5px; border-radius:999px; background:rgba(255,255,255,0.85);}
  .wbar-day{font-size:9.5px; color:var(--dim); font-family:var(--mono);} .wbar-date{font-size:9px; color:var(--dim2);}

  .catbar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;} .catbar-row:last-child{margin-bottom:0;}
  .catbar-ic{width:20px; text-align:center; font-size:13px;}
  .cat-icon-sm{display:inline-flex; align-items:center; justify-content:center; vertical-align:-2px;}
  .cat-icon-sm svg{width:13px; height:13px; display:block;}
  .catbar-name{font-size:11.5px; color:var(--dim); width:74px; flex-shrink:0;}
  .catbar-track{flex:1; height:9px; border-radius:6px; background:var(--panel2); overflow:hidden;}
  .catbar-fill{height:100%; border-radius:6px; transition:width .5s;}
  .catbar-pct{font-family:var(--mono); font-size:11px; width:34px; text-align:right; color:var(--dim);}

  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .calhead{font-size:9.5px; color:var(--dim2); text-align:center; font-family:var(--mono); padding-bottom:2px;}
  .calcell{aspect-ratio:1; border-radius:7px; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-family:var(--mono); color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.55); position:relative; background:var(--panel2); border:1px solid transparent;}
  .calcell.today{border-color:var(--gold); color:var(--text); font-weight:800;} .calcell.empty{background:transparent;}
  .calendar-legend{display:flex; flex-wrap:wrap; gap:8px 12px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border);}
  .cal-leg-chip{display:flex; align-items:center; gap:5px; font-size:10.5px; font-weight:700; color:var(--dim);}
  .cal-leg-chip .dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}

  .yearbars{display:flex; align-items:flex-end; gap:5px; height:150px;}
  .ybar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end;}
  .ybar-pct{font-size:8.5px; font-weight:800;}
  .ybar-track{position:relative; width:100%; max-width:16px; height:98px; border-radius:999px; display:flex; align-items:flex-end; overflow:hidden;}
  .ybar-fill{width:100%; border-radius:999px; position:relative; min-height:6px;}
  .ybar-fill::after{content:''; position:absolute; top:2px; left:50%; transform:translateX(-50%); width:55%; height:4px; border-radius:999px; background:rgba(255,255,255,0.85);}
  .ybar-lbl{font-size:8px; color:var(--dim2); font-family:var(--mono);}

  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .stat{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:12px 14px;}
  .stat .v{font-family:var(--mono); font-weight:800; font-size:20px;} .stat .l{font-size:10px; color:var(--dim); margin-top:2px;}

  .badgegrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .badge{background:var(--panel2); border:1px solid var(--border); border-radius:14px; padding:12px 6px;
    display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; opacity:.35;}
  .badge.earned{opacity:1; background:linear-gradient(150deg,#26314A,#1B2230); border-color:#3E4F70;}
  .badge .ic{font-size:22px;} .badge .t{font-size:9px; color:var(--dim); line-height:1.3;} .badge.earned .t{color:var(--text); font-weight:600;}

  .method-cat-title{font-size:12px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:.04em; margin:18px 0 10px;}
  .method-cat-title:first-child{margin-top:0;}
  .method-card{display:flex; gap:10px; align-items:flex-start; background:var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:12px 12px; margin-bottom:8px; cursor:pointer;}
  .method-card.selected{border-color:var(--teal); background:linear-gradient(145deg,#16241f,#171e27);}
  .method-chk{width:22px;height:22px;border-radius:7px; border:2px solid var(--dim2); flex-shrink:0; margin-top:1px;
    display:flex;align-items:center;justify-content:center;}
  .method-card.selected .method-chk{background:var(--teal); border-color:var(--teal);}
  .method-chk svg{width:12px;height:12px; opacity:0;}
  .method-card.selected .method-chk svg{opacity:1;}
  .method-body{flex:1; min-width:0;}
  .method-name-row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .method-name{font-size:13px; font-weight:700; color:var(--text);}
  .method-desc{font-size:11.3px; color:var(--dim); margin-top:3px; line-height:1.4;}
  .method-link{font-size:10.5px; color:var(--gold); text-decoration:none; margin-top:5px; display:inline-block; font-weight:600;}
  .method-reason{font-size:10.5px; color:var(--teal); margin-top:6px; font-weight:600; display:flex; align-items:flex-start; gap:5px; line-height:1.4;}
  .method-reason .ic{flex-shrink:0;}
  .method-detail-toggle{font-size:10px; font-weight:700; color:var(--gold); flex-shrink:0; padding:3px 8px; border-radius:8px;
    border:1px solid var(--border); transition:transform .2s;}
  .method-detail-toggle.open{transform:rotate(180deg);}
  .method-detail{max-height:0; overflow:hidden; transition:max-height .35s ease;}
  .method-detail.open{max-height:1600px;}
  .method-detail-inner{margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); font-size:11.5px; color:#C4CBD6; line-height:1.55;}
  .method-detail-inner p{margin:0 0 8px;}
  .method-detail-inner p b{color:var(--text);}
  .method-detail-inner ol{margin:0 0 8px; padding-left:18px; display:flex; flex-direction:column; gap:4px;}
  .metrics-empty-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:28px 20px; text-align:center;}
  .metrics-empty-card .ic{font-size:34px; margin-bottom:10px;}
  .metrics-empty-card .t{font-size:13.5px; font-weight:700; margin-bottom:6px;}
  .metrics-empty-card .d{font-size:11.5px; color:var(--dim); line-height:1.6; max-width:280px; margin:0 auto 16px;}

  #navbar{display:none;}
  #navbar-inner{width:100%; max-width:460px; display:flex;}
  .navitem{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 8px;
    background:none; border:none; color:var(--dim2); cursor:pointer;}

function bmiValue(w,h){ if(!w||!h) return null; const m=h/100; return w/(m*m); }
function bmiCategoryAsia(bmi){
  if(bmi==null) return null;
  if(bmi<18.5) return {label:'Thiбәҝu cГўn', hex:'#4FA8FF'};
  if(bmi<23)   return {label:'BГ¬nh thЖ°б»қng', hex:'#2CDBA8'};
  if(bmi<25)   return {label:'Thб»«a cГўn (nguy cЖЎ)', hex:'#FF8A3D'};
  return {label:'BГ©o phГ¬', hex:'#FF5A6E'};
}
function bmrValue(p){
  if(!p || !p.weight || !p.height || !p.age) return null;
  const base = 10*p.weight + 6.25*p.height - 5*p.age;
  return p.gender==='nu' ? base-161 : base+5;
}
function tdeeValue(p){ const bmr=bmrValue(p); if(bmr==null) return null; return bmr*(ACTIVITY_FACTORS[p.activity]||1.55); }
function maxHRValue(age){ return age ? Math.round(208-0.7*age) : null; }
function mafHRValue(age){ return age ? Math.round(180-age) : null; }
function idealWeightRange(h){ if(!h) return null; const m=h/100; return {min:Math.round(18.5*m*m), max:Math.round(22.9*m*m)}; }
function profileComplete(p){ return !!(p && p.weight && p.height && p.age); }

function aiRecommendMethods(p, bmi, cat){
  const picks = [];
  const add = id => { if(!picks.includes(id)) picks.push(id); };
  if(cat){
    if(cat.label==='Thiбәҝu cГўn'){ add('full_body'); add('5x5'); }
    else if(cat.label==='BГ¬nh thЖ°б»қng'){ add('run_walk'); add('full_body'); }
    else if(cat.label.indexOf('Thб»«a cГўn')===0){ add('maf'); add('full_body'); }
    else if(cat.label==='BГ©o phГ¬'){ add('maf'); add('c25k'); }
  }
  if(p.age>=40) add('maf');
  if(p.activity==='sedentary'||p.activity==='light') add('c25k');
  if(p.activity==='active'||p.activity==='very_active') add('fartlek');

function fmtHM(d){ return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDateVN(d){ return WD[d.getDay()]+', '+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function dayOfYear(d){ const start=new Date(d.getFullYear(),0,0); return Math.floor((d-start)/86400000); }

function programWeekFor(dateObj){
  if(!SETTINGS.programStart) return 1;
  const start = parseKey(SETTINGS.programStart);
  return Math.max(1, Math.floor(daysBetween(start, dateObj)/7)+1);
}

function getPlanForKey(key){
  const base = getPlanForDate(parseKey(key));
  const rec = LOG[key] || {};
  const removed = rec.removed || {};
  const filteredBase = base.filter(t=>!removed[t.id]);
  const custom = (rec.customTasks||[]).map(ct=>({ id:ct.id, time:ct.time, dur:ct.dur, label:ct.label, cat:ct.cat, kind:'custom', sub:[] }));
  return [...filteredBase, ...custom].sort((a,b)=> a.time.localeCompare(b.time));
}
function isRestDay(dateObj){ return [2,4,6].includes(dateObj.getDay()); }
function isDayOff(key){ return !!(LOG[key] && LOG[key].dayOff); }
function toggleDayOff(key){
  if(!LOG[key]) LOG[key] = {tasks:{}};
  LOG[key].dayOff = !LOG[key].dayOff;
  saveLog();
}
function submitAddTask(){
  const labelEl = document.getElementById('new-task-label');
  const label = labelEl ? labelEl.value.trim() : '';
  if(!label){ if(labelEl) labelEl.focus(); return; }
  const time = (document.getElementById('new-task-time')||{}).value || '08:00';
  const dur = parseInt((document.getElementById('new-task-dur')||{}).value, 10) || 30;
  const cat = (document.getElementById('new-task-cat')||{}).value || 'the_luc';
  const key = todayKey();
  if(!LOG[key]) LOG[key] = {tasks:{}};
  if(!LOG[key].customTasks) LOG[key].customTasks = [];
  LOG[key].customTasks.push({ id:'custom_'+Date.now(), time, dur, label, cat });
  saveLog();
  STATE.addingTask = false;
  renderContent();
}
function removeTaskForToday(taskId, isCustom){
  const key = todayKey();
  if(!LOG[key]) LOG[key] = {tasks:{}};
  if(isCustom){ LOG[key].customTasks = (LOG[key].customTasks||[]).filter(t=>t.id!==taskId); }
  else { if(!LOG[key].removed) LOG[key].removed = {}; LOG[key].removed[taskId] = true; }
  if(LOG[key].tasks) delete LOG[key].tasks[taskId];
  saveLog();
  renderContent();
}
function restoreTaskForToday(taskId){
  const key = todayKey();
  if(LOG[key] && LOG[key].removed){ delete LOG[key].removed[taskId]; saveLog(); renderContent(); }
}
function resetTodayRemoved(){
  const key = todayKey();
  if(LOG[key] && LOG[key].removed){ LOG[key].removed = {}; saveLog(); renderContent(); }
}
function timeRangeLabel(t, baseDate){
  const [hh,mm] = t.time.split(':').map(Number);
  const end = t.endLabel ? t.endLabel : fmtHM(addMinutes(baseDate,hh,mm,t.dur||0));
  return `${t.time}<span class="end">вҖ“${end}</span>`;
}

function dayRecord(key){ return LOG[key] || {tasks:{}}; }
function dayPlanInfo(key){

const REST_DAY_XP = 30;
// Viб»Үc quГЎ giб»қ hбә№n 60 phГәt mГ  chЖ°a tick hoГ n thГ nh sбәҪ tб»ұ Д‘б»ҷng bб»Ӣ Д‘ГЎnh dбәҘu "khГҙng hoГ n thГ nh"
// (rec.failed[taskId]=true) вҖ” trб»« XP nhбә№ (40% so vб»ӣi mб»©c Д‘Ж°б»Јc cб»ҷng nбәҝu hoГ n thГ nh) Д‘б»ғ tбәЎo Д‘б»ҷng lб»ұc,

const FAIL_XP_PENALTY = Math.round(XP_PER_TASK*0.4);
function failedCountForList(list, rec){ return list.filter(t=>rec.failed && rec.failed[t.id] && !rec.tasks[t.id]).length; }
function dayPct(key){ if(isDayOff(key)) return 100; const {done,total} = dayPlanInfo(key); return total>0 ? Math.round(done/total*100) : 0; }
function dayXP(key){
  if(isDayOff(key)) return REST_DAY_XP;
  const {plan, rec, done, total} = dayPlanInfo(key);
  if(total===0) return 0;
  const base = done*XP_PER_TASK + (done===total?PERFECT_BONUS:0);
  return Math.max(0, base - failedCountForList(plan, rec)*FAIL_XP_PENALTY);
}
function dayMaxXP(key){ if(isDayOff(key)) return REST_DAY_XP; const {total} = dayPlanInfo(key); return total>0 ? total*XP_PER_TASK+PERFECT_BONUS : 0; }
// QuГ©t viб»Үc cб»§a HГ”M NAY, tб»ұ Д‘ГЎnh dбәҘu "khГҙng hoГ n thГ nh" cho viб»Үc nГ o Д‘ГЈ trб»… quГЎ 60 phГәt mГ 
// vбә«n chЖ°a tick xong вҖ” ghi vГ o LOG cб»§a ngГ y Д‘Гі Д‘б»ғ cГі dб»Ҝ liб»Үu lб»Ӣch sб»ӯ/thб»‘ng kГӘ lГўu dГ i.
function autoFailOverdueTasks(){
  const now = new Date(); const key = todayKey();
  if(isDayOff(key)) return;
  const plan = getPlanForKey(key);
  if(!LOG[key]) LOG[key] = {tasks:{}};
  const rec = LOG[key];
  if(!rec.failed) rec.failed = {};
  let changed = false;
  plan.forEach(t=>{
    if(t.kind==='sleep' || !t.time) return;
    if(rec.tasks[t.id] || rec.failed[t.id]) return;
    const [hh,mm] = t.time.split(':').map(Number);
    const taskTime = new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0);
    if((now-taskTime)/60000 >= 60){ rec.failed[t.id] = true; changed = true; }
  });
  if(changed){ saveLog(); if(STATE.tab==='today') renderContent(); }
}

function computeStreak(){
  let d = new Date(); let key = toKey(d);

  // Д‘Гўy lГ  dб»Ҝ liб»Үu thб»ұc tбәҝ nhбәҘt phбәЈn ГЎnh viб»Үc cГі thб»ұc sб»ұ bб»Ҹ lб»Ў hay khГҙng.

let STORAGE_MODE='unknown'; const MEM={};
function hasCloudStorage(){ return typeof window.storage!=='undefined' && window.storage && typeof window.storage.get==='function' && typeof window.storage.set==='function'; }
function withTimeout(promise, ms){
  return new Promise((resolve,reject)=>{
    let done=false; const timer=setTimeout(()=>{ if(!done){done=true; reject(new Error('timeout'));} }, ms);
    promise.then(v=>{ if(!done){done=true; clearTimeout(timer); resolve(v);} }).catch(e=>{ if(!done){done=true; clearTimeout(timer); reject(e);} });
  });
}
async function storageGet(key){
  if(hasCloudStorage()){
    try{ const res = await withTimeout(window.storage.get(key,false), 2500); STORAGE_MODE='cloud'; return (res&&res.value)?res.value:null; }catch(e){}
  }
  try{ const v = localStorage.getItem('rlmn_'+key); STORAGE_MODE=(STORAGE_MODE==='cloud')?'cloud':'local'; return v; }
  catch(e){ STORAGE_MODE='memory'; return (key in MEM)?MEM[key]:null; }
}
async function storageSet(key, value){
  let cloudOk=false;
  if(hasCloudStorage()){ try{ await withTimeout(window.storage.set(key,value,false), 2500); cloudOk=true; STORAGE_MODE='cloud'; }catch(e){} }
  if(!cloudOk){ try{ localStorage.setItem('rlmn_'+key,value); if(STORAGE_MODE!=='cloud') STORAGE_MODE='local'; } catch(e){ MEM[key]=value; STORAGE_MODE='memory'; } }
}

function markDriveConnected(v){ try{ v ? localStorage.setItem('drive-connected','1') : localStorage.removeItem('drive-connected'); }catch(e){} }

function initDriveSync(){
  if(!hasGisSdk()) { setTimeout(initDriveSync, 400); return; }
  driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: DRIVE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: onDriveTokenResponse
  });
  if(wasDriveConnected()){
    try{ driveTokenClient.requestAccessToken({prompt:''}); }catch(e){}
  }
}
function driveSignIn(){
  if(!driveTokenClient){ alert('Дҗang khб»ҹi tбәЎo kбәҝt nб»‘i Google, thб»ӯ lбәЎi sau vГ i giГўy.'); return; }
  driveTokenClient.requestAccessToken({prompt:'consent'});
}
function driveSignOut(){
  if(driveAccessToken){ try{ google.accounts.oauth2.revoke(driveAccessToken, ()=>{}); }catch(e){} }
  driveAccessToken=null; driveTokenExpiry=0; driveFileId=null; driveUserEmail=null;
  markDriveConnected(false);
  clearTimeout(driveSilentTimer);
  STATE.acctMenuOpen = false;
  STATE.tab = 'authgate';
  renderContent();
  window.scrollTo(0,0);
}
async function onDriveTokenResponse(resp){
  if(!resp || resp.error){ if(wasDriveConnected()) markDriveConnected(false); renderContent(); return; }
  const wasConnected = !!driveAccessToken;
  driveAccessToken = resp.access_token;
  driveTokenExpiry = Date.now() + ((resp.expires_in||3500)*1000);
  markDriveConnected(true);
  scheduleSilentRefresh();
  try{ await fetchDriveUserEmail(); }catch(e){}
  if(!wasConnected){
    driveSyncing = true; renderContent();
    try{
      await ensureDriveFile();
      await pullFromDrive();
      driveSyncOk = true;
    }catch(e){ console.error('Drive init error', e); driveSyncOk = false; }
    driveSyncing = false;
  }
  if(STATE.tab==='authgate') STATE.tab = 'hub';
  renderContent();
}
function scheduleSilentRefresh(){
  clearTimeout(driveSilentTimer);
  const delay = Math.max(driveTokenExpiry - Date.now() - 120000, 30000);
  driveSilentTimer = setTimeout(()=>{ if(driveTokenClient) driveTokenClient.requestAccessToken({prompt:''}); }, delay);
}
async function driveFetch(url, options={}){
  if(!driveAccessToken) throw new Error('no-token');
  const headers = Object.assign({}, options.headers||{}, {Authorization: 'Bearer '+driveAccessToken});
  const res = await fetch(url, Object.assign({}, options, {headers}));
  if(res.status===401){ driveAccessToken=null; throw new Error('unauthorized'); }
  return res;
}
async function fetchDriveUserEmail(){
  try{
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+driveAccessToken}});
    if(res.ok){ const d = await res.json(); driveUserEmail = d.email || d.name || null; }
  }catch(e){}
}
// QUAN TRб»ҢNG: nбәҝu 2 lб»қi gб»Қi ensureDriveFile() chбәЎy gбә§n nhЖ° Д‘б»“ng thб»қi (vГӯ dб»Ҙ pullFromDrive() lГәc
// Д‘Дғng nhбәӯp vГ  pushToDrive() tб»« autosave xбәЈy ra cГ№ng lГәc) mГ  chЖ°a gГЎn xong driveFileId, cбәЈ 2 sбәҪ
// cГ№ng tГ¬m-khГҙng-thбәҘy rб»“i cГ№ng tбәЎo file mб»ӣi вҶ’ sinh ra nhiб»Ғu bбәЈn rlmn-hub-data.json trГ№ng lбә·p trГӘn
// Drive (Д‘Гўy chГӯnh lГ  nguyГӘn nhГўn sГўu xa khiбәҝn dб»Ҝ liб»Үu/hГ¬nh бәЈnh cГі lГәc khГҙng Д‘б»“ng bб»ҷ Д‘Гәng giб»Ҝa cГЎc
// thiбәҝt bб»Ӣ вҖ” thiбәҝt bб»Ӣ nГ y ghi vГ o file A, thiбәҝt bб»Ӣ kia Д‘б»Қc tб»« file B). Cache lбәЎi Promise Д‘ang chбәЎy
// Д‘б»ғ mб»Қi lб»қi gб»Қi dГ№ng chung 1 lбә§n tГ¬m/tбәЎo duy nhбәҘt, trГЎnh race condition nГ y.
let ensureDriveFilePromise = null;
async function ensureDriveFile(){
  if(driveFileId) return driveFileId;
  if(ensureDriveFilePromise) return ensureDriveFilePromise;
  ensureDriveFilePromise = (async () => {
    try{
      const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
      const listRes = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`);
      const listData = await listRes.json();
      if(listData.files && listData.files.length){ driveFileId = listData.files[0].id; return driveFileId; }
      const metadata = {name: DRIVE_FILE_NAME, mimeType:'application/json'};
      const boundary = '-------rlmnhub' + Date.now();
      const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n{}\r\n--${boundary}--`;
      const createRes = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method:'POST',
        headers:{'Content-Type': `multipart/related; boundary=${boundary}`},
        body
      });
      const createData = await createRes.json();
      driveFileId = createData.id;
      return driveFileId;
    } finally {
      ensureDriveFilePromise = null;
    }
  })();
  return ensureDriveFilePromise;
}
function collectAllData(){
  return { progressLog: JSON.stringify(LOG), settings: JSON.stringify(SETTINGS), kiemhang: JSON.stringify(KIEMHANG), updatedAt: Date.now() };
}
async function pullFromDrive(){
  if(!driveAccessToken) return;
  await ensureDriveFile();
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`);
  if(!res.ok){ driveSyncOk = false; return; }
  let data = {};
  try{ data = await res.json(); }catch(e){ data = {}; }
  const hasRemoteData = data && (data.progressLog || data.settings || data.kiemhang);
  if(hasRemoteData){
    if(data.progressLog){ try{ LOG = JSON.parse(data.progressLog); }catch(e){} }
    if(data.settings){ try{ SETTINGS = Object.assign(SETTINGS, JSON.parse(data.settings)); }catch(e){} }
    if(data.kiemhang){ try{ KIEMHANG = Object.assign({}, KIEMHANG, JSON.parse(data.kiemhang)); }catch(e){} }
    saveLog(); saveSettings(); saveKiemHang();
    driveSyncOk = true;
  } else {
    await pushToDriveNow();
  }
}
let driveSaveTimer=null;
function pushToDrive(){
  if(!driveAccessToken) return;
  clearTimeout(driveSaveTimer);
  driveSaveTimer = setTimeout(()=>{ pushToDriveNow(); }, 900);
}
// Drive API "uploadType=media" (upload Д‘ЖЎn giбәЈn, khГҙng resumable) giб»ӣi hбәЎn khoбәЈng 5MB/request.
// бәўnh nб»Ғn/banner/danh mб»Ҙc lЖ°u dбәЎng base64 trong SETTINGS cГі thб»ғ vЖ°б»Јt mб»©c nГ y nбәҝu ngЖ°б»қi dГ№ng
// chб»Қn бәЈnh gб»‘c lб»ӣn вҖ” trЖ°б»ӣc Д‘Гўy lб»—i bб»Ӣ nuб»‘t Гўm thбә§m (chб»ү console.error) nГӘn nhГ¬n nhЖ° "khГҙng Д‘б»“ng bб»ҷ"
// mГ  khГҙng rГө lГҪ do. Giб»қ theo dГөi driveSyncOk + tб»ұ thб»ӯ lбәЎi 1 lбә§n Д‘б»ғ tДғng khбәЈ nДғng thГ nh cГҙng.
async function pushToDriveNow(isRetry){
  if(!driveAccessToken) return;
  try{
    await ensureDriveFile();
    const body = JSON.stringify(collectAllData());
    if(body.length > 4.5*1024*1024){
      console.warn('Drive push: payload quГЎ lб»ӣn ('+Math.round(body.length/1024)+'KB), cГі thб»ғ bб»Ӣ tб»« chб»‘i.');
    }
    const res = await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    driveSyncOk = true;
    if(STATE.tab==='hub') renderContent();
  }catch(e){
    console.error('Drive push error', e);
    if(!isRetry){ setTimeout(()=>pushToDriveNow(true), 4000); return; }
    driveSyncOk = false;
    if(STATE.tab==='hub') renderContent();
  }
}
async function driveManualResync(){
  if(!driveAccessToken){ alert('BбәЎn chЖ°a Д‘Дғng nhбәӯp Google Drive.'); return; }
  driveSyncing = true; renderContent();
  try{ await pullFromDrive(); }
  catch(e){ driveSyncOk = false; }
  driveSyncing = false; renderContent();
}

function toggleTask(key, taskId){
  if(!LOG[key]) LOG[key] = {tasks:{}};
  const wasDone = !!LOG[key].tasks[taskId];
  LOG[key].tasks[taskId] = !wasDone;
  if(!wasDone){
    const plan = getPlanForKey(key);
    const t = plan.find(x=>x.id===taskId);
    if(t && METHODS[t.cat]){
      const picked = pickMethodForCategory(t.cat, parseKey(key));
      if(picked){ if(!LOG[key].methodPicks) LOG[key].methodPicks = {}; LOG[key].methodPicks[t.cat] = picked.id; }
    }
  }
  saveLog(); checkLevelUp();
}

// ================= TOASTS (level up) =================
function showToast(icon, title, subtitle){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div'); el.className='toast';
  el.innerHTML = `<div class="tic">${icon}</div><div><div class="tt">${title}</div><div class="ts">${subtitle}</div></div>`;
  root.appendChild(el); setTimeout(()=>el.remove(), 3200);
}
function checkLevelUp(){
  const newLevel = levelInfo().lvl;
  if(newLevel > lastKnownLevel){
    const oldTier = tierFor(lastKnownLevel), newTier = tierFor(newLevel);
    if(newTier.name !== oldTier.name) showToast(newTier.icon, 'TIбәҫN HГ“A! '+newTier.name, 'ДҗбәЎt Level '+newLevel+' вҖ” biб»ғu tЖ°б»Јng Д‘ГЈ nГўng cбәҘp!');
    else showToast('вӯҗ', 'LEVEL UP!', 'BбәЎn Д‘ГЈ lГӘn Level '+newLevel);
    lastKnownLevel = newLevel;
  }
  renderContent();
}

// ================= IN-APP POPUPS =================
function enqueuePopup(icon, title, msg, late){
  popupQueue.push({icon,title,msg,late}); processPopupQueue();
}
function processPopupQueue(){
  if(popupShowing || popupQueue.length===0) return;
  popupShowing = true;
  const {icon,title,msg,late} = popupQueue.shift();
  const root = document.getElementById('popup-root');
  const card = document.getElementById('popup-card');
  card.className = 'popup-card' + (late?' late':'');
  card.innerHTML = `<div class="pic">${icon}</div><div class="pt">${title}</div><div class="pm">${msg}</div><button data-action="popup-dismiss">ДҗГЈ biбәҝt</button>`;
  root.classList.add('show');
  setTimeout(()=>{ if(root.classList.contains('show')) dismissPopup(); }, 8000);
}
function dismissPopup(){
  document.getElementById('popup-root').classList.remove('show');
  popupShowing = false;
  setTimeout(processPopupQueue, 300);
}
function showNotifOnboarding(){
  if(popupShowing) return;
  popupShowing = true;
  const root = document.getElementById('popup-root');
  const card = document.getElementById('popup-card');
  card.className = 'popup-card';
  card.innerHTML = `<div class="pic">рҹ””</div><div class="pt">Bбәӯt nhбәҜc nhб»ҹ?</div>
    <div class="pm">App sбәҪ bГЎo tб»•ng kбәҝt cuб»‘i ngГ y. TrбәЎng thГЎi tб»«ng viб»Үc (sбәҜp tб»ӣi giб»қ / trб»… lб»Ӣch) sбәҪ hiб»Үn ngay khi bбәЎn bбәҘm mб»ҹ viб»Үc Д‘Гі вҖ” khГҙng lГ m phiб»Ғn bбәұng nhiб»Ғu pop-up.</div>
    <div style="display:flex; gap:8px;">
      <button style="background:var(--panel2); color:var(--dim); flex:1;" data-action="notif-later">Дҗб»ғ sau</button>
      <button style="flex:1;" data-action="notif-enable">Bбәӯt ngay</button>
    </div>`;
  root.classList.add('show');
}
document.getElementById('popup-root').addEventListener('click', (e)=>{
  if(e.target.closest('[data-action="popup-dismiss"]')){ dismissPopup(); return; }
  if(e.target.closest('[data-action="notif-later"]')){
    SETTINGS.notifPrompted = true; saveSettings();
    document.getElementById('popup-root').classList.remove('show'); popupShowing = false;
    setTimeout(processPopupQueue, 300);
    return;
  }
  if(e.target.closest('[data-action="notif-enable"]')){
    SETTINGS.notifPrompted = true; saveSettings();
    document.getElementById('popup-root').classList.remove('show'); popupShowing = false;
    if('Notification' in window){ Notification.requestPermission().then(()=>renderHUD()); }
    setTimeout(processPopupQueue, 300);
    return;
  }
});

// ================= ADVICE ENGINE =================
function buildAdvice(dateKeys){
  const tracked = dateKeys.filter(k=>LOG[k] && dayPlanInfo(k).total>0);
  if(tracked.length===0) return ["ChЖ°a cГі dб»Ҝ liб»Үu trong giai Д‘oбәЎn nГ y. BбәҜt Д‘бә§u Д‘ГЎnh dбәҘu hoГ n thГ nh cГЎc mб»Ҙc hГҙm nay Д‘б»ғ mГ¬nh phГўn tГӯch cho bбәЎn nhГ©!"];
  const catRate = {};
  Object.keys(CATS).forEach(cat=>{
    let done=0,total=0; tracked.forEach(k=>{ if(isDayOff(k)) return; const ci=catInfo(k,cat); done+=ci.done; total+=ci.total; });
    catRate[cat] = total>0 ? done/total : -1;
  });
  const validCats = Object.keys(catRate).filter(c=>catRate[c]>=0);
  const sortedCats = validCats.sort((a,b)=>catRate[a]-catRate[b]);
  const weakest = sortedCats[0]; const strongest = sortedCats[sortedCats.length-1];
  let trendMsg='';
  if(tracked.length>=4){
    const half=Math.floor(tracked.length/2);
    const avg = arr=>arr.reduce((s,k)=>s+dayPct(k),0)/arr.length;
    const a1=avg(tracked.slice(0,half)), a2=avg(tracked.slice(half));
    if(a2-a1>=8) trendMsg = `Xu hЖ°б»ӣng Д‘ang <b>cбәЈi thiб»Үn rГө rб»Үt</b> вҖ” tб»« ${Math.round(a1)}% lГӘn ${Math.round(a2)}%. Cб»© giб»Ҝ nhб»Ӣp Д‘б»ҷ nГ y!`;
    else if(a1-a2>=8) trendMsg = `Hiб»Үu suбәҘt Д‘ang <b>giбәЈm nhбә№</b> (${Math.round(a1)}% вҶ’ ${Math.round(a2)}%). Xem lбәЎi giб»қ giбәҘc hoбә·c mб»©c tбәЈi cГі Д‘ang quГЎ sб»©c khГҙng.`;
    else trendMsg = `Hiб»Үu suбәҘt khГЎ <b>б»•n Д‘б»Ӣnh</b> quanh mб»©c ${Math.round(a2)}%.`;
  }
  const avgPct = Math.round(tracked.reduce((s,k)=>s+dayPct(k),0)/tracked.length);
  const streak = computeStreak();
  const restCount = tracked.filter(k=>isDayOff(k)).length;
  const msgs = [`Tб»· lб»Ү hoГ n thГ nh trung bГ¬nh: <b>${avgPct}%</b> trГӘn ${tracked.length} ngГ y cГі dб»Ҝ liб»Үu${restCount>0?` (trong Д‘Гі cГі <b>${restCount} ngГ y nghб»ү chб»§ Д‘б»ҷng</b>, Д‘Ж°б»Јc tГӯnh lГ  hoГ n thГ nh)`:''}. ${trendMsg}`];
  if(weakest && catRate[weakest] < 0.6){
    let tip='';
    if(weakest==='the_luc') tip='thб»ӯ rГәt ngбәҜn buб»•i chбәЎy/tбәӯp hoбә·c Д‘б»•i khung giб»қ cho phГ№ hб»Јp nДғng lЖ°б»Јng buб»•i sГЎng.';
    else if(weakest==='tieng_anh') tip='thб»ӯ gб»ҷp bб»ӣt 1 buб»•i luyб»Үn nГіi/shadowing ngбәҜn hЖЎn thay vГ¬ bб»Ҹ hбәіn.';
    else if(weakest==='chuyen_mon') tip='thб»ӯ Д‘бә·t mб»Ҙc tiГӘu nhб»Ҹ hЖЎn (15-20 phГәt) Д‘б»ғ dб»… duy trГ¬ mб»—i ngГ y.';
    else tip='thб»ӯ Д‘бә·t bГЎo thб»©c nhбәҜc giб»қ ngб»§ trЖ°б»ӣc 15 phГәt Д‘б»ғ tбәЎo thГіi quen.';
    msgs.push(`NhГіm <b>${CATS[weakest].label}</b> Д‘ang lГ  Д‘iб»ғm yбәҝu nhбәҘt (${Math.round(catRate[weakest]*100)}%). Gб»Јi ГҪ: ${tip}`);
  } else if(weakest){
    msgs.push(`TбәҘt cбәЈ cГЎc nhГіm Д‘б»Ғu duy trГ¬ khГЎ tб»‘t (thбәҘp nhбәҘt: <b>${CATS[weakest].label}</b> ${Math.round(catRate[weakest]*100)}%). MбәЎnh nhбәҘt: <b>${CATS[strongest].label}</b> (${Math.round(catRate[strongest]*100)}%).`);
  }
  if(streak>=3) msgs.push(`рҹ”Ҙ Дҗang giб»Ҝ chuб»—i <b>${streak} ngГ y</b> liГӘn tiбәҝp Д‘бәЎt trГӘn 75%. Дҗб»«ng Д‘б»ғ Д‘б»©t mбәЎch nhГ©!`);
  else if(streak===0) msgs.push(`ChЖ°a cГі chuб»—i ngГ y liГӘn tiбәҝp nГ o вҖ” bбәҜt Д‘бә§u lбәЎi tб»« hГҙm nay, chб»ү cбә§n Д‘бәЎt 75% mб»—i ngГ y lГ  Д‘Ж°б»Јc tГӯnh!`);
  const p = SETTINGS.profile;
  if(profileComplete(p)){
    const bmi = bmiValue(p.weight, p.height); const cat = bmiCategoryAsia(bmi);
    const theLucRate = catRate['the_luc'];
    if(theLucRate>=0){
      if(cat.label.indexOf('Thб»«a cГўn')===0 || cat.label==='BГ©o phГ¬'){
        if(theLucRate<0.6) msgs.push(`Vб»ӣi BMI ${bmi.toFixed(1)} (${cat.label.toLowerCase()}) vГ  tб»· lб»Ү hoГ n thГ nh Thб»ғ lб»ұc mб»ӣi ${Math.round(theLucRate*100)}%, Ж°u tiГӘn tДғng Д‘б»Ғu Д‘бә·n cГЎc buб»•i chбәЎy nhбә№ nhГ ng (MAF/Run-Walk) sбәҪ hiб»Үu quбәЈ hЖЎn lГ  dб»“n cЖ°б»қng Д‘б»ҷ cao вҖ” bб»Ғn vб»Ҝng quan trб»Қng hЖЎn nhanh.`);
        else msgs.push(`Tб»· lб»Ү hoГ n thГ nh Thб»ғ lб»ұc ${Math.round(theLucRate*100)}% Д‘ang tб»‘t вҖ” vб»ӣi BMI ${bmi.toFixed(1)}, tiбәҝp tб»Ҙc nhб»Ӣp Д‘б»ҷ vб»«a phбәЈi nГ y Д‘б»ғ giбәЈm cГўn an toГ n (khoбәЈng 0.5kg/tuбә§n lГ  hб»Јp lГҪ).`);
      } else if(cat.label==='Thiбәҝu cГўn' && theLucRate<0.6){
        msgs.push(`BMI ${bmi.toFixed(1)} Д‘ang б»ҹ mб»©c thiбәҝu cГўn вҖ” nГӘn Д‘бәЈm bбәЈo Д‘б»§ Thб»ғ lб»ұc (Д‘бә·c biб»Үt tбәӯp tбәЎ) Д‘б»ғ xГўy cЖЎ, trГЎnh giбәЈm cГўn thГӘm.`);
      }
    }
    if(p.age>=40 && avgPct<70){
      msgs.push(`б»һ Д‘б»ҷ tuб»•i ${p.age}, cЖЎ thб»ғ cбә§n thб»қi gian phб»Ҙc hб»“i lГўu hЖЎn вҖ” nбәҝu thбәҘy khГі duy trГ¬ ${avgPct}%, thб»ӯ giбәЈm cЖ°б»қng Д‘б»ҷ thay vГ¬ giбәЈm tбә§n suбәҘt.`);
    }
  }
  return msgs;
}

function openDayDetail(key, track){
  renderDayDetail(key, track||'schedule');
  document.getElementById('day-detail-modal').classList.add('show');
}
function closeDayDetail(){ document.getElementById('day-detail-modal').classList.remove('show'); }
function renderDayDetail(key, track){
  const d = parseKey(key);
  const off = isDayOff(key);
  const dateLabel = `${WD[d.getDay()]}, ${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
  let bodyHtml;
  if(off){
    bodyHtml = `<div class="day-detail-empty">рҹҢҙ ДҗГўy lГ  ngГ y nghб»ү Д‘ГЈ Д‘ГЎnh dбәҘu вҖ” khГҙng tГӯnh vГ o thб»‘ng kГӘ.</div>`;
  } else {
    const tasks = trackTasksForDay(key, track);
    const rec = dayRecord(key);
    if(!tasks.length){
      bodyHtml = `<div class="day-detail-empty">KhГҙng cГі viб»Үc nГ o Д‘Ж°б»Јc lГӘn lб»Ӣch cho ngГ y nГ y.</div>`;
    } else {
      const doneCount = tasks.filter(t=>rec.tasks[t.id]).length;
      const pct = Math.round(doneCount/tasks.length*100);
      const rows = tasks.map(t=>{
        const isDone = !!rec.tasks[t.id];
        const isFailed = !isDone && !!(rec.failed && rec.failed[t.id]);
        return `<div class="task-wrap ${isDone?'done':''} ${isFailed?'failed':''}">
          <div class="task">
            <div class="time">${t.time||''}</div>
            <div class="catdot" style="background:${CATS[t.cat]?CATS[t.cat].hex:'#8B96A8'}"></div>
            <div class="lbl">${escapeHtml(t.label||'')}${isFailed?' <span class="fail-tag">ДҗГЈ bб»Ҹ lб»Ў</span>':''}</div>
            <div class="chk">${isFailed
              ? '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#0E1218" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'
              : '<svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" stroke="#0E1218" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'}</div>
          </div>
        </div>`;
      }).join('');
      bodyHtml = `<div class="day-detail-summary">HoГ n thГ nh ${doneCount}/${tasks.length} viб»Үc вҖ” ${pct}%</div>${rows}`;
    }
  }
  document.getElementById('day-detail-card').innerHTML = `<div class="avatar-modal-title">${dateLabel}</div>${bodyHtml}`;
}

function openAvatarModal(){ renderAvatarModal(); document.getElementById('avatar-modal').classList.add('show'); }
function closeAvatarModal(){ document.getElementById('avatar-modal').classList.remove('show'); }
function handleAvatarFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const size = 240;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      SETTINGS.avatarType = 'image'; SETTINGS.avatarImage = dataUrl; SETTINGS.avatarEmoji = null;
      saveSettings(); closeAvatarModal(); renderHUD();
    };
    img.onerror = ()=>{ alert('KhГҙng Д‘б»Қc Д‘Ж°б»Јc бәЈnh nГ y, thб»ӯ бәЈnh khГЎc nhГ©.'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('avatar-file-input').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  handleAvatarFile(file);
  e.target.value = '';
});
function handleBannerFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      // CбәҜt Д‘Гәng tб»ү lб»Ү khung banner ngay trГӘn бәЈnh gб»‘c (mб»ҷt lбә§n duy nhбәҘt) rб»“i mб»ӣi thu nhб»Ҹ,
      // thay vГ¬ scale-rб»“i-crop nhЖ° trЖ°б»ӣc вҖ” giб»Ҝ Д‘Ж°б»Јc Д‘б»ҷ nГ©t cao nhбәҘt cГі thб»ғ so vб»ӣi бәЈnh gб»‘c.
      const targetRatio = 900/320;
      const srcRatio = img.width/img.height;
      let cropW, cropH;
      if(srcRatio > targetRatio){ cropH = img.height; cropW = cropH*targetRatio; }
      else { cropW = img.width; cropH = cropW/targetRatio; }
      const sx = (img.width-cropW)/2, sy = (img.height-cropH)/2;
      // GiбәЈm kГӯch thЖ°б»ӣc/chбәҘt lЖ°б»Јng so vб»ӣi trЖ°б»ӣc (1600px/0.94) Д‘б»ғ бәЈnh base64 nhбә№ hЖЎn nhiб»Ғu вҖ”
      // trГЎnh vЖ°б»Јt giб»ӣi hбәЎn ~5MB/request cб»§a Google Drive khiбәҝn бәЈnh khГҙng Д‘б»“ng bб»ҷ Д‘Ж°б»Јc giб»Ҝa cГЎc mГЎy.
      const maxW = 1000;
      const outW = Math.min(maxW, Math.round(cropW));
      const outH = Math.round(outW/targetRatio);
      const canvas = document.createElement('canvas');
      canvas.width = outW; canvas.height = outH;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, sx, sy, cropW, cropH, 0, 0, outW, outH);
      SETTINGS.bannerImage = canvas.toDataURL('image/jpeg', 0.8);
      saveSettings(); renderContent();
    };
    img.onerror = ()=>{ alert('KhГҙng Д‘б»Қc Д‘Ж°б»Јc бәЈnh nГ y, thб»ӯ бәЈnh khГЎc nhГ©.'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('banner-file-input').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  handleBannerFile(file);
  e.target.value = '';
});
function applyAppBackground(){
  const el = document.body;
  if(SETTINGS.appBackground){
    el.style.backgroundImage = `linear-gradient(180deg, rgba(14,18,24,0.72), rgba(14,18,24,0.88)), url('${SETTINGS.appBackground}')`;
    el.style.backgroundSize = 'cover';

}
function handleBgFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      // GiбәЈm kГӯch thЖ°б»ӣc/chбәҘt lЖ°б»Јng so vб»ӣi trЖ°б»ӣc (1600px/0.85) вҖ” lГҪ do tЖ°ЖЎng tб»ұ бәЈnh banner б»ҹ trГӘn.
      const maxDim = 1200;
      const scale = Math.min(1, maxDim/Math.max(img.width, img.height));
      const outW = Math.round(img.width*scale), outH = Math.round(img.height*scale);
      const canvas = document.createElement('canvas');
      canvas.width = outW; canvas.height = outH;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, outW, outH);
      SETTINGS.appBackground = canvas.toDataURL('image/jpeg', 0.72);
      saveSettings(); applyAppBackground(); renderContent();
    };
    img.onerror = ()=>{ alert('KhГҙng Д‘б»Қc Д‘Ж°б»Јc бәЈnh nГ y, thб»ӯ бәЈnh khГЎc nhГ©.'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('bg-file-input').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  handleBgFile(file);
  e.target.value = '';
});
function handleCatImageFile(file){

// ================= KIEM HANG: DATA HELPERS =================
function khNotes(catId){ return KIEMHANG[catId] || []; }
function khGenId(){ return 'kh'+Date.now()+Math.random().toString(36).slice(2,7); }
function khSaveNote(catId, editId, title, content){
  if(!KIEMHANG[catId]) KIEMHANG[catId] = [];
  const now = Date.now();
  if(editId){
    const idx = KIEMHANG[catId].findIndex(n=>n.id===editId);
    if(idx>=0){ KIEMHANG[catId][idx].title=title; KIEMHANG[catId][idx].content=content; KIEMHANG[catId][idx].updatedAt=now; }
  } else {
    KIEMHANG[catId].unshift({id:khGenId(), title, content, updatedAt:now});
  }
  saveKiemHang();
}
function khDeleteNote(catId, id){
  if(!KIEMHANG[catId]) return;
  KIEMHANG[catId] = KIEMHANG[catId].filter(n=>n.id!==id);
  saveKiemHang();
}
function khFmtDate(ts){
  try{ const d = new Date(ts); return d.toLocaleDateString('vi-VN')+' '+d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; }
}

function renderRingsSVG(key, size){
  const {plan} = dayPlanInfo(key);
  const catsPresent = Object.keys(CATS).filter(c=> plan.some(t=>t.cat===c));
  const cx=size/2, cy=size/2, gap=15; let radius = size/2 - 10;
  let svg = `<svg id="rings-svg" viewBox="0 0 ${size} ${size}">`;
  catsPresent.forEach((cat,i)=>{
    const r = radius - i*gap; const circ = 2*Math.PI*r;
    const ci = catInfo(key,cat); const pct = ci.total>0 ? ci.done/ci.total : 0;
    const offset = circ*(1-pct);
    svg += `<circle class="ring-bg" cx="${cx}" cy="${cy}" r="${r}"/>`;
    svg += `<circle class="ring-fg" cx="${cx}" cy="${cy}" r="${r}" stroke="${CATS[cat].hex}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" transform="rotate(-90 ${cx} ${cy})" data-final="${offset}"/>`;
  });
  const pctTotal = dayPct(key);
  svg += `<g class="ring-center" text-anchor="middle"><text x="${cx}" y="${cy-2}" class="big">${pctTotal}%</text><text x="${cx}" y="${cy+16}" class="small">HOГҖN THГҖNH</text></g></svg>`;
  return svg;
}
// ============ VГ’NG TRГ’N THб»җNG KГҠ NGГҖY (day wheel) вҖ” mб»—i mГәi lГ  1 viб»Үc theo giб»қ thб»ұc tбәҝ,
// tГҙ Д‘бәӯm nбәҝu Д‘ГЈ hoГ n thГ nh / mб»қ nбәҝu chЖ°a, cГі kim chб»ү giб»қ hiб»Үn tбәЎi. CГі thб»ғ lб»Қc theo 1 nhГіm (vd tiбәҝng_anh).
function polarPt(cx,cy,r,angleDeg){
  const rad = (angleDeg-90)*Math.PI/180;
  return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)];
}
function annulusSectorPath(cx,cy,r0,r1,a1,a2){
  if(a2<=a1) a2 = a1+0.01;
  const large = (a2-a1)>180 ? 1 : 0;
  const [x1,y1] = polarPt(cx,cy,r1,a1);
  const [x2,y2] = polarPt(cx,cy,r1,a2);
  const [x3,y3] = polarPt(cx,cy,r0,a2);
  const [x4,y4] = polarPt(cx,cy,r0,a1);
  return `M${x1.toFixed(1)},${y1.toFixed(1)} A${r1},${r1} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${x3.toFixed(1)},${y3.toFixed(1)} A${r0},${r0} 0 ${large} 0 ${x4.toFixed(1)},${y4.toFixed(1)} Z`;
}
function timeToAngleDeg(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return ((h*60+m)/1440)*360;
}
function renderDayWheel(key, filterCat, size){
  const {plan, rec, done: doneAll, total: totalAll} = dayPlanInfo(key);
  const scoped = filterCat ? plan.filter(t=>t.cat===filterCat) : plan;
  const tasks = scoped.filter(t=>t.time).slice().sort((a,b)=> timeToAngleDeg(a.time)-timeToAngleDeg(b.time));
  const done = scoped.filter(t=>rec.tasks[t.id]).length;
  const total = scoped.length;
  const cx=size/2, cy=size/2, r1=size/2-15, r0=r1-size*0.2;
  let wedges = '';
  if(tasks.length===0){
    wedges = `<circle cx="${cx}" cy="${cy}" r="${(r0+r1)/2}" fill="none" stroke="var(--border)" stroke-width="${(r1-r0).toFixed(1)}"/>`;
  } else if(tasks.length===1){
    const t = tasks[0]; const isDone = !!rec.tasks[t.id];
    wedges = `<circle cx="${cx}" cy="${cy}" r="${(r0+r1)/2}" fill="none" stroke="${CATS[t.cat].hex}" stroke-opacity="${isDone?1:0.35}" stroke-width="${(r1-r0).toFixed(1)}"/>
      <text x="${cx}" y="${(cy-r1+(r1-r0)/2+4).toFixed(1)}" text-anchor="middle" font-size="13">${CATS[t.cat].icon}</text>`;
  } else {
    tasks.forEach((t,i)=>{
      const a1 = timeToAngleDeg(t.time);
      let a2 = i+1<tasks.length ? timeToAngleDeg(tasks[i+1].time) : timeToAngleDeg(tasks[0].time)+360;
      if(a2<=a1) a2 += 360;
      const isDone = !!rec.tasks[t.id];
      wedges += `<path d="${annulusSectorPath(cx,cy,r0,r1,a1,a2)}" fill="${CATS[t.cat].hex}" opacity="${isDone?1:0.35}"/>`;
      if((a2-a1) > 14){
        const midA = (a1+a2)/2;
        const [ix,iy] = polarPt(cx,cy,(r0+r1)/2, midA);
        wedges += `<text x="${ix.toFixed(1)}" y="${(iy+4).toFixed(1)}" text-anchor="middle" font-size="12">${CATS[t.cat].icon}</text>`;
      }
    });
  }
  const now = new Date();
  const isToday = key===todayKey();
  let pointer = '';
  if(isToday){
    const nowAngle = ((now.getHours()*60+now.getMinutes())/1440)*360;
    const [px,py] = polarPt(cx,cy,r1+9,nowAngle);
    pointer = `<polygon points="0,-6 -5,4 5,4" fill="var(--gold)" transform="translate(${px.toFixed(1)} ${py.toFixed(1)}) rotate(${nowAngle.toFixed(1)})"/>`;
  }
  const pct = total>0 ? Math.round(done/total*100) : 0;
  const timeLabel = isToday ? pad(now.getHours())+':'+pad(now.getMinutes()) : '';
  const gid = 'dwc'+Math.random().toString(36).slice(2,8);
  return `<div class="daywheel-wrap">
    <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
      <text x="${cx}" y="13" text-anchor="middle" font-size="13">вҳҖпёҸ</text>
      <text x="${cx}" y="${size-3}" text-anchor="middle" font-size="12">рҹҢҷ</text>
      ${wedges}
      ${pointer}
      <circle cx="${cx}" cy="${cy}" r="${(r0-4).toFixed(1)}" fill="url(#${gid})"/>
      <text x="${cx}" y="${cy-3}" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="19" fill="#fff">${pct}%</text>
      <text x="${cx}" y="${cy+16}" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="rgba(255,255,255,0.75)">${done}/${total}${timeLabel?' В· '+timeLabel:''}</text>
      <defs><radialGradient id="${gid}" cx="0.35" cy="0.3" r="0.9"><stop offset="0" stop-color="#2A3648"/><stop offset="1" stop-color="#12161e"/></radialGradient></defs>
    </svg>
  </div>`;
}

// chб»ү giб»ӣi hбәЎn cho Google Drive API + domain GitHub Pages cб»§a app (an toГ n khi lб»ҷ ra client-side).
const MUSIC_DRIVE_FOLDER_ID = '1PYfq51iwXii8EKpZmClge5_lWH51-HD_';
const MUSIC_DRIVE_API_KEY = 'AIzaSyD5KqLrSx3vJHcY4lxsxFIxoDeXcb_sJzQ';
const MUSIC_CACHE_NAME = 'drive-music-cache-v1';
function driveFileStreamUrl(fileId){ return `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${MUSIC_DRIVE_API_KEY}`; }
// VбәҪ lбәЎi giao diб»Үn nhЖ°ng giб»Ҝ nguyГӘn vб»Ӣ trГӯ cuб»ҷn hiб»Үn tбәЎi вҖ” dГ№ng cho cГЎc thao tГЎc play/pause/tбәЈi
// trong playlist Д‘б»ғ bГ i hГЎt phГЎt ngay tбәЎi chб»—, khГҙng bб»Ӣ nhбәЈy lГӘn Д‘бә§u trang.
function renderContentPreserveScroll(){
  const y = window.scrollY || window.pageYOffset || 0;
  renderContent();
  window.scrollTo(0, y);
}
async function fetchDriveMusicList(){
  STATE.driveMusicLoading = true; renderContentPreserveScroll();
  try{
    const q = encodeURIComponent(`'${MUSIC_DRIVE_FOLDER_ID}' in parents and trashed=false`);
    const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,mimeType)&key=${MUSIC_DRIVE_API_KEY}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const files = (data.files||[]).filter(f=>f.mimeType && f.mimeType.indexOf('audio')===0);
    STATE.driveMusicList = files;
    STATE.driveMusicError = null;
    if('caches' in window){
      try{
        const cache = await caches.open(MUSIC_CACHE_NAME);
        const cachedIds = [];
        for(const f of files){ if(await cache.match(driveFileStreamUrl(f.id))) cachedIds.push(f.id); }
        STATE.driveCachedIds = cachedIds;
        // Дҗб»“ng bб»ҷ danh sГЎch offline Д‘ГЈ lЖ°u вҖ” loбәЎi cГЎc bГ i Д‘ГЈ bб»Ӣ trГ¬nh duyб»Үt tб»ұ dб»Қn cache.
        SETTINGS.driveOfflineSongs = (SETTINGS.driveOfflineSongs||[]).filter(s=>cachedIds.includes(s.id));
        saveSettings();
      }catch(e){}
    }
  }catch(e){
    STATE.driveMusicError = 'KhГҙng tбәЈi Д‘Ж°б»Јc danh sГЎch tб»« Google Drive. Kiб»ғm tra kбәҝt nб»‘i mбәЎng rб»“i bбәҘm lГ m mб»ӣi.';
  }
  STATE.driveMusicLoading = false;
  renderContentPreserveScroll();
}
async function playDriveSong(fileId, name){
  STATE.playingSongId = null;
  STATE.playingDriveId = fileId;
  STATE.playingDriveName = name;
  STATE.driveAudioPlaying = true;
  renderContentPreserveScroll();
  const audio = document.getElementById('drive-audio-player');
  let src = driveFileStreamUrl(fileId);
  if('caches' in window){
    try{
      const cache = await caches.open(MUSIC_CACHE_NAME);
      const match = await cache.match(src);
      if(match){ const blob = await match.blob(); src = URL.createObjectURL(blob); }
    }catch(e){}
  }
  audio.src = src;
  audio.play().catch(e=>{ console.error(e); STATE.driveAudioPlaying = false; renderContentPreserveScroll(); });
}
function setDriveViewMode(mode){
  STATE.driveViewMode = mode;
  renderContentPreserveScroll();
}
async function downloadDriveSong(fileId, name){
  if(!('caches' in window)){ showToast('вҡ пёҸ','KhГҙng hб»— trб»Ј','TrГ¬nh duyб»Үt nГ y khГҙng hб»— trб»Ј lЖ°u nhбәЎc offline.'); return; }
  showToast('в¬ҮпёҸ','Дҗang tбәЈi...', escapeHtml(name)+' Д‘ang Д‘Ж°б»Јc lЖ°u Д‘б»ғ nghe offline.');
  try{
    const cache = await caches.open(MUSIC_CACHE_NAME);
    await cache.add(driveFileStreamUrl(fileId));
    STATE.driveCachedIds = (STATE.driveCachedIds||[]).concat([fileId]);
    SETTINGS.driveOfflineSongs = (SETTINGS.driveOfflineSongs||[]).filter(s=>s.id!==fileId).concat([{id:fileId, name}]);
    saveSettings();
    showToast('вң…','ДҗГЈ tбәЈi xong', escapeHtml(name)+' giб»қ nghe offline Д‘Ж°б»Јc rб»“i.');
  }catch(e){
    showToast('вҡ пёҸ','Lб»—i tбәЈi','KhГҙng tбәЈi Д‘Ж°б»Јc bГ i nГ y Д‘б»ғ nghe offline, thб»ӯ lбәЎi sau.');
  }
  renderContentPreserveScroll();
}
async function removeDriveSongCache(fileId){
  if('caches' in window){
    try{ const cache = await caches.open(MUSIC_CACHE_NAME); await cache.delete(driveFileStreamUrl(fileId)); }catch(e){}
  }
  STATE.driveCachedIds = (STATE.driveCachedIds||[]).filter(id=>id!==fileId);
  SETTINGS.driveOfflineSongs = (SETTINGS.driveOfflineSongs||[]).filter(s=>s.id!==fileId);
  saveSettings();
  renderContentPreserveScroll();
}

// ngoГ i #content nГӘn khГҙng bб»Ӣ mбәҘt khi renderContent() vбәҪ lбәЎi giao diб»Үn).
(function initDriveAudioEvents(){
  const audio = document.getElementById('drive-audio-player');
  if(!audio) return;
  audio.addEventListener('play', ()=>{ STATE.driveAudioPlaying = true; if(STATE.tab==='ent-music') renderContentPreserveScroll(); });
  audio.addEventListener('pause', ()=>{ STATE.driveAudioPlaying = false; if(STATE.tab==='ent-music') renderContentPreserveScroll(); });
  audio.addEventListener('ended', ()=>{ STATE.driveAudioPlaying = false; driveNextSong(); });
})();
function parseYouTubeUrl(url){
  try{
    const u = new URL(url.trim());
    const host = u.hostname.replace(/^www\./,'');
    let videoId = null;
    if(host==='youtu.be'){ videoId = u.pathname.slice(1).split('/')[0]; }
    else if(host==='youtube.com' || host==='m.youtube.com' || host==='music.youtube.com'){
      if(u.pathname==='/watch'){ videoId = u.searchParams.get('v'); }
      else if(u.pathname.startsWith('/embed/')){ videoId = u.pathname.split('/embed/')[1]; }
      else if(u.pathname.startsWith('/shorts/')){ videoId = u.pathname.split('/shorts/')[1]; }
    } else return null;
    const listId = u.searchParams.get('list');
    if(videoId) return {type:'video', embed:`https://www.youtube.com/embed/${videoId}${listId?('?list='+listId):''}`, thumb:`https://img.youtube.com/vi/${videoId}/mqdefault.jpg`};
    if(listId) return {type:'playlist', embed:`https://www.youtube.com/embed/videoseries?list=${listId}`, thumb:null};
  }catch(e){}
  return null;
}
function addMusicSong(){
  const url = (window.prompt('DГЎn link YouTube (video hoбә·c playlist):')||'').trim();
  if(!url) return;
  const parsed = parseYouTubeUrl(url);
  if(!parsed){ showToast('вҡ пёҸ','Link khГҙng hб»Јp lб»Ү','Vui lГІng dГЎn link YouTube hб»Јp lб»Ү (youtube.com hoбә·c youtu.be).'); return; }
  const defaultTitle = parsed.type==='playlist' ? 'Playlist YouTube' : 'BГ i hГЎt mб»ӣi';
  const title = (window.prompt('TГӘn bГ i hГЎt / playlist:', defaultTitle)||defaultTitle).trim();
  SETTINGS.musicPlaylist = (SETTINGS.musicPlaylist||[]).concat([{id:'song_'+Date.now(), title, type:parsed.type, embed:parsed.embed, thumb:parsed.thumb}]);
  STATE.playingSongId = SETTINGS.musicPlaylist[SETTINGS.musicPlaylist.length-1].id;
  saveSettings(); renderContent();
}

function ytNextSong(){
  const list = SETTINGS.musicPlaylist||[];
  if(!list.length) return;
  const idx = list.findIndex(s=>s.id===STATE.playingSongId);
  const nextIdx = idx>=0 ? (idx+1)%list.length : 0;
  playMusicSong(list[nextIdx].id);
}
function ytPrevSong(){
  const list = SETTINGS.musicPlaylist||[];
  if(!list.length) return;
  const idx = list.findIndex(s=>s.id===STATE.playingSongId);
  const prevIdx = idx>0 ? idx-1 : list.length-1;
  playMusicSong(list[prevIdx].id);
}
function driveNextSong(){
  const list = STATE.driveMusicList||[];
  if(!list.length) return;
  const idx = list.findIndex(f=>f.id===STATE.playingDriveId);
  const nextIdx = idx>=0 ? (idx+1)%list.length : 0;
  const f = list[nextIdx];
  playDriveSong(f.id, f.name);
}

  const tasksHtml = plan.map(t=>{
    const isDone = !!rec.tasks[t.id];
    const [hh,mm] = t.time.split(':').map(Number);

    const overdue = !isDone && key===todayKey() && now > taskTime && t.kind!=='sleep';

  const resetHtml = removedCount>0 ? `<button class="reset-today-btn" data-action="reset-today-removed">вҶә Дҗбә·t lбәЎi lб»Ӣch mбә·c Д‘б»Ӣnh hГҙm nay (${removedCount} viб»Үc Д‘ГЈ бә©n)</button>` : '';

      <div style="font-family:var(--mono); font-weight:800; font-size:22px; color:var(--gold);">${xp} / ${maxXp}</div>
      <div style="font-size:11px; color:var(--dim); margin-top:2px;">${(total>0 && done===total) ? 'рҹҺү HoГ n hбәЈo! +'+PERFECT_BONUS+' XP thЖ°б»ҹng' : 'HoГ n thГ nh 100% Д‘б»ғ nhбәӯn +'+PERFECT_BONUS+' XP thЖ°б»ҹng'}</div>

function getMonthMatrix(year,month){
  const first = new Date(year,month,1); const startOffset = (first.getDay()+6)%7;
  const daysInMonth = new Date(year,month+1,0).getDate();
  const cells=[]; for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  return cells;
}
function heatColor(pct){
  if(pct<=0) return 'var(--panel2)'; if(pct<25) return '#4a3d1f'; if(pct<50) return '#7a611f';

}

// nhiб»Ғu mГ u hЖЎn giГәp nhГ¬n sinh Д‘б»ҷng vГ  dб»… phГўn biб»Үt ngГ y nГ o lГ m nhГіm viб»Үc gГ¬.
function alphaHex(pct){ const a = Math.round(76 + Math.max(0,Math.min(100,pct))/100*179); return a.toString(16).padStart(2,'0'); }
function dayCellColor(key, track){
  const cats = TRACK_CATS[track].map(cat=>({cat, ...catInfo(key,cat)})).filter(c=>c.total>0);
  if(!cats.length) return 'var(--panel2)';
  if(cats.length===1){
    const c = cats[0]; const pct = Math.round(c.done/c.total*100);
    return CATS[c.cat].hex + alphaHex(pct);
  }
  const n = cats.length;
  const stops = cats.map((c,i)=>{
    const pct = Math.round(c.done/c.total*100);
    const color = CATS[c.cat].hex + alphaHex(pct);
    const from = Math.round(i/n*100), to = Math.round((i+1)/n*100);
    return `${color} ${from}%, ${color} ${to}%`;
  }).join(', ');
  return `linear-gradient(90deg, ${stops})`;
}
function dayCellTitle(key, track){
  const cats = TRACK_CATS[track].map(cat=>({cat, ...catInfo(key,cat)})).filter(c=>c.total>0);
  if(!cats.length) return 'ChЖ°a cГі viб»Үc';
  return cats.map(c=>`${CATS[c.cat].label}: ${c.done}/${c.total}`).join(' В· ');
}

    <button class="${STATE.statsView==='month'?'active':''}" data-view="month">ThГЎng</button>
    <button class="${STATE.statsView==='year'?'active':''}" data-view="year">NДғm</button>
  </div>`;
}
function attachStatsSegEvents(){
  document.querySelectorAll('#stats-seg button').forEach(btn=>{ btn.onclick=()=>{ STATE.statsView=btn.getAttribute('data-view'); renderContent(); }; });
}

// ================= MAIN RENDER =================
function renderStatsFor(track){
  if(STATE.statsView==='week') renderWeek(track);
  else if(STATE.statsView==='month') renderMonth(track);
  else renderYear(track);
}
function renderContent(){
  destroyCharts();
  if(STATE.tab==='authgate') renderAuthGate();
  else if(STATE.tab==='hub') renderHub();
  else if(STATE.tab==='today') renderToday();
  else if(STATE.tab==='schedule-methods') renderGeneral();
  else if(STATE.tab==='schedule-metrics') renderScheduleMetrics();
  else if(STATE.tab==='stats') renderStatsFor('schedule');
  else if(STATE.tab==='english') renderEnglish();
  else if(STATE.tab==='english-methods') renderEnglishMethods();
  else if(STATE.tab==='english-stats') renderEnglishStats();
  else if(STATE.tab==='profile') renderProfile();
  else if(STATE.tab==='kiemhang') renderKiemHang();
  else if(STATE.tab==='nhua-embed') renderNhuaEmbed();
  else if(STATE.tab==='entertainment') renderEntertainment();
  else if(STATE.tab==='ent-music') renderMusicPlaylist();
  else if(STATE.tab==='customcat') renderCustomCat();
  renderNav(); renderHUD();
}

  const addSongEl = e.target.closest('[data-action="add-music-song"]');

  const refreshDriveEl = e.target.closest('[data-action="refresh-drive-music"]');
  if(refreshDriveEl){ fetchDriveMusicList(); return; }

  const ytPrevEl = e.target.closest('[data-action="yt-prev-song"]');
  if(ytPrevEl){ ytPrevSong(); return; }
  const ytNextEl = e.target.closest('[data-action="yt-next-song"]');

// ================= REMINDERS / IN-APP POPUPS =================
function alreadyNotified(key, flagKey){ return !!(LOG[key] && LOG[key].notified && LOG[key].notified[flagKey]); }
function markNotified(key, flagKey){
  if(!LOG[key]) LOG[key] = {tasks:{}};
  if(!LOG[key].notified) LOG[key].notified = {};
  LOG[key].notified[flagKey] = true;
  saveLog();
}
function checkReminders(){
  autoFailOverdueTasks();
  const now = new Date(); const key = todayKey();
  if(isDayOff(key)) return;
  const {plan, rec} = dayPlanInfo(key);
  const notifOk = ('Notification' in window) && Notification.permission==='granted';
  // NhбәҜc nhб»ҹ tб»«ng viб»Үc (sбәҜp tб»ӣi giб»қ / trб»… lб»Ӣch) khГҙng cГІn tб»ұ Д‘б»ҷng hiб»Үn pop-up nб»Ҝa вҖ”
  // trбәЎng thГЎi nГ y giб»қ chб»ү hiб»Үn khi ngЖ°б»қi dГ№ng bбәҘm mб»ҹ chi tiбәҝt viб»Үc Д‘Гі (xem taskReminderBanner()).
  if(now.getHours()===21 && now.getMinutes()>=45 && now.getMinutes()<48){
    const sumKey = 'summary';
    if(!alreadyNotified(key, sumKey)){
      markNotified(key, sumKey);
      const incomplete = plan.filter(t=>!rec.tasks[t.id]);
      if(incomplete.length>0){
        enqueuePopup('рҹ“Ӣ','Tб»•ng kбәҝt hГҙm nay', 'BбәЎn cГІn '+incomplete.length+' viб»Үc chЖ°a hoГ n thГ nh: '+incomplete.map(t=>t.label).join(', '));
        if(notifOk){ try{ new Notification('рҹ“Ӣ Tб»•ng kбәҝt hГҙm nay', {body:'CГІn '+incomplete.length+' viб»Үc chЖ°a xong', vibrate:[200,100,200], requireInteraction:true, icon:'icon-192.png'}); }catch(e){} }
      } else {
        enqueuePopup('рҹҺү','XuбәҘt sбәҜc!', 'BбәЎn Д‘ГЈ hoГ n thГ nh tбәҘt cбәЈ nhiб»Үm vб»Ҙ hГҙm nay!');
        if(notifOk){ try{ new Notification('рҹҺү XuбәҘt sбәҜc!', {body:'HoГ n thГ nh tбәҘt cбәЈ nhiб»Үm vб»Ҙ hГҙm nay!', icon:'icon-192.png'}); }catch(e){} }
      }
    }
  }
}

(async function init(){
  try{ await loadAll(); }catch(e){ console.error('Init storage error', e); }
  lastKnownLevel = levelInfo().lvl;
  // LuГҙn mб»ҹ app б»ҹ mГ n hГ¬nh Д‘Дғng nhбәӯp trЖ°б»ӣc. Chб»ү chuyб»ғn sang mГ n hГ¬nh chГӯnh SAU KHI xГЎc nhбәӯn

})();
