<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E1218">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ethan Nguyễn</title>
<style>
  :root{
    --bg:#0E1218; --panel:#171E27; --panel2:#1D2531; --border:#2A3341;
    --text:#EDF2F7; --dim:#8B96A8; --dim2:#5C6779;
    --gold:#FFC94A; --orange:#FF8A3D; --blue:#4FA8FF; --teal:#2CDBA8; --red:#FF5A6E;
    --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{display:flex; justify-content:center; min-height:100vh;
    background:radial-gradient(circle at 50% -10%, #1A2333 0%, var(--bg) 55%);}
  #shell{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column;
    position:relative; padding-bottom:calc(24px + env(safe-area-inset-bottom));}

  #hud{padding:calc(16px + env(safe-area-inset-top)) 18px 14px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--border); background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);}
  .brand{display:flex; flex-direction:column; flex:1; min-width:0;}
  .brand .name{font-size:14px; font-weight:800; letter-spacing:0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .brand .date{font-size:11px; color:var(--dim); font-family:var(--mono); margin-top:1px;}
  .emblem{width:40px;height:40px;border-radius:12px; display:flex;align-items:center;justify-content:center;
    font-size:20px; flex-shrink:0; cursor:pointer; overflow:hidden; position:relative;}
  .emblem img{width:100%; height:100%; object-fit:cover;}
  .emblem .edit-dot{position:absolute; bottom:-2px; right:-2px; width:14px;height:14px; border-radius:50%;
    background:var(--gold); border:2px solid var(--bg); font-size:8px; display:flex; align-items:center; justify-content:center;}
  .streak{display:flex; align-items:center; gap:4px; background:var(--panel2); border:1px solid var(--border);
    padding:6px 9px; border-radius:11px; flex-shrink:0;}
  .streak .fl{font-size:14px;} .streak .n{font-family:var(--mono); font-weight:800; font-size:13px;}
  .bellbtn{width:34px;height:34px;border-radius:10px; background:var(--panel2); border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center; font-size:15px; flex-shrink:0; cursor:pointer;}
  .bellbtn.on{background:linear-gradient(145deg,#3a2f16,#2a2210); border-color:#6b5620; color:var(--gold);}

  #xpwrap{padding:0 18px 14px; border-bottom:1px solid var(--border);}
  #xpbar-track{height:6px; border-radius:6px; background:var(--panel2); overflow:hidden; margin-top:2px;}
  #xpbar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--gold),#FFE08A); transition:width .5s cubic-bezier(.2,.9,.3,1);}
  .xplabel{display:flex; justify-content:space-between; font-size:10.3px; color:var(--dim); font-family:var(--mono); margin-top:6px;}

  #content{flex:1; padding:16px 16px 24px;}
  .seg{display:flex; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:3px; gap:3px; margin-bottom:16px;}
  .seg button{flex:1; border:none; background:transparent; color:var(--dim); font-family:var(--sans);
    font-size:12px; font-weight:700; padding:8px 2px; border-radius:9px; cursor:pointer;}
  .seg button.active{background:linear-gradient(135deg,var(--gold),#FF8A3D); color:#171208; box-shadow:0 3px 10px rgba(255,201,74,0.35);}

  .ringcard{background:radial-gradient(120% 140% at 50% -20%, #1B2434 0%, var(--panel) 60%);
    border:1px solid var(--border); border-radius:20px; padding:22px 18px 18px;
    display:flex; flex-direction:column; align-items:center; margin-bottom:14px;}
  .ringcard.pulse{ animation: pulseGlow 900ms ease; }
  @keyframes pulseGlow{0%{box-shadow:0 0 0 0 rgba(255,201,74,0);}30%{box-shadow:0 0 40px 6px rgba(255,201,74,.35);}100%{box-shadow:0 0 0 0 rgba(255,201,74,0);}}
  #rings-svg{width:180px; height:180px;}
  .ring-bg{fill:none; stroke:var(--panel2); stroke-width:11;}
  .ring-fg{fill:none; stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset .7s cubic-bezier(.2,.9,.3,1);}
  .ring-center{font-family:var(--mono);}
  .ring-center .big{font-size:24px; font-weight:800; fill:var(--text);}
  .ring-center .small{font-size:9px; fill:var(--dim); letter-spacing:.05em;}
  .legend{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:14px;}
  .leg-item{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:6px 12px; border-radius:20px;}
  .leg-dot{width:8px;height:8px;border-radius:50%;}
  .leg-item b{font-family:var(--mono);}

  .rest-banner{background:linear-gradient(145deg,#1c2536,#171e27); border:1px dashed var(--border);
    border-radius:14px; padding:12px 14px; margin-bottom:14px; font-size:12px; color:var(--dim); text-align:center;}

  .dayoff-toggle{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:10px 14px; margin-bottom:14px; cursor:pointer; font-size:12px; color:var(--dim); font-weight:600;}
  .dayoff-toggle.active{background:linear-gradient(145deg,#16241f,#171e27); border-color:var(--teal); color:var(--teal);}
  .dayoff-toggle span:first-child{font-size:16px;}
  .rest-day-card{background:radial-gradient(120% 140% at 50% -20%, #1B2434 0%, var(--panel) 60%); border:1px solid var(--border); border-radius:20px;}

  .add-task-btn{width:100%; background:var(--panel); border:1px dashed var(--border); color:var(--dim);
    font-size:12.5px; font-weight:700; padding:13px; border-radius:14px; cursor:pointer; margin-top:8px;}
  .reset-today-btn{width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--gold);
    font-size:11.5px; font-weight:700; padding:11px; border-radius:12px; cursor:pointer; margin-top:8px;}
  .form-input{width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    font-size:13px; padding:10px 12px; border-radius:10px; font-family:var(--sans);}
  .form-input::placeholder{color:var(--dim2);}
  .form-btn{flex:1; border:none; padding:11px; border-radius:10px; font-size:12.5px; font-weight:700; cursor:pointer;}
  .form-btn.submit{background:linear-gradient(90deg,var(--gold),#FFE08A); color:#0E1218;}
  .form-btn.cancel{background:var(--panel2); color:var(--dim); border:1px solid var(--border);}

  .rm{width:20px;height:20px;border-radius:6px; display:flex; align-items:center; justify-content:center;
    color:var(--dim2); font-size:10px; flex-shrink:0; margin-left:2px;}
  .restore-row{margin-top:10px; display:flex; flex-wrap:wrap; gap:6px;}

  .tasklist{display:flex; flex-direction:column; gap:8px;}
  .task-wrap{background:var(--panel); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  .task-wrap.done{border-color:#333f52;}
  .task-wrap.overdue{border-color:#5a2f38;}
  .task{display:flex; align-items:center; gap:11px; padding:12px 12px; cursor:pointer; user-select:none;}
  .task .time{font-family:var(--mono); font-size:10.5px; color:var(--dim); width:52px; flex-shrink:0; line-height:1.3;}
  .task .time .end{color:var(--dim2); font-size:9.5px;}
  .task .catdot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
  .task .lbl{flex:1; font-size:13px; font-weight:600; min-width:0; display:flex; align-items:center; gap:6px;}
  .task-wrap.done .lbl{color:var(--dim); text-decoration:line-through; text-decoration-color:var(--dim2); font-weight:500;}
  .chev{font-size:10px; color:var(--dim2); transition:transform .2s; flex-shrink:0;}
  .chev.open{transform:rotate(90deg);}
  .chk{width:23px;height:23px;border-radius:8px; border:2px solid var(--dim2); flex-shrink:0;
    display:flex;align-items:center;justify-content:center; transition:all .2s;}
  .task-wrap.done .chk{background:var(--teal); border-color:var(--teal);}
  .chk svg{width:13px;height:13px; opacity:0; transform:scale(.5); transition:all .15s;}
  .task-wrap.done .chk svg{opacity:1; transform:scale(1);}
  .subpanel{max-height:0; overflow:hidden; transition:max-height .4s ease;}
  .subpanel.open{max-height:1400px;}
  .subinner{padding:2px 14px 16px 14px;}
  .sublist{margin:0 0 10px; padding-left:16px; display:flex; flex-direction:column; gap:5px;}
  .sublist li{font-size:11.8px; color:#B7C0CD; line-height:1.4;}
  .video-btn{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700;
    color:#0E1218; background:linear-gradient(90deg,var(--gold),#FFE08A); padding:7px 12px; border-radius:9px;
    text-decoration:none; margin-top:2px;}
  .link-chip{display:inline-flex; align-items:center; gap:5px; font-size:10.8px; font-weight:600;
    color:var(--dim); background:var(--panel2); border:1px solid var(--border); padding:5px 10px; border-radius:8px;
    text-decoration:none; margin:2px 4px 2px 0;}

  .exercise-card{display:flex; gap:10px; align-items:center; background:var(--panel2); border:1px solid var(--border);
    border-radius:12px; padding:8px 10px; margin-bottom:7px;}
  .exercise-pic{width:38px;height:38px; flex-shrink:0; color:var(--gold);}
  .exercise-info{flex:1; min-width:0;}
  .exercise-name{font-size:12px; font-weight:700; color:var(--text);}
  .exercise-sr{font-size:10.5px; color:var(--dim); font-family:var(--mono); margin-top:1px;}
  .exercise-video{flex-shrink:0; width:30px;height:30px; border-radius:9px; background:linear-gradient(145deg,var(--gold),#c99a2e);
    display:flex;align-items:center;justify-content:center; text-decoration:none; font-size:12px; color:#171208;}

  .ipa-note{font-size:11.5px; color:var(--gold); background:rgba(255,201,74,0.08); border:1px solid rgba(255,201,74,0.25);
    padding:8px 10px; border-radius:10px; margin-bottom:10px;}
  .ipa-progress{font-size:10.5px; color:var(--dim); margin-bottom:8px; font-family:var(--mono);}
  .ipa-group-title{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim2); margin:8px 0 6px;}
  .ipa-grid{display:flex; flex-wrap:wrap; gap:6px;}
  .ipa-chip{display:flex; flex-direction:column; align-items:center; gap:1px; min-width:44px;
    background:var(--panel); border:1px solid var(--border); border-radius:9px; padding:5px 4px; cursor:pointer;}
  .ipa-chip .sym{font-family:var(--mono); font-size:12px; font-weight:700;}
  .ipa-chip .wd{font-size:8px; color:var(--dim2);}
  .ipa-chip.learned{background:linear-gradient(145deg,#1d3d34,#16281f); border-color:var(--teal);}
  .ipa-chip.learned .sym{color:var(--teal);}

  .level-seg{display:flex; gap:6px; margin-bottom:10px;}
  .level-seg button{flex:1; font-size:10.5px; font-weight:700; padding:7px 4px; border-radius:8px;
    background:var(--panel2); border:1px solid var(--border); color:var(--dim); cursor:pointer;}
  .level-seg button.active{background:linear-gradient(135deg,var(--blue),#2568b0); color:#fff; border-color:transparent; box-shadow:0 3px 10px rgba(79,168,255,0.35);}
  .suggest-box{background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:8px;}
  .suggest-box .sg-lbl{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim2); margin-bottom:3px;}
  .suggest-box .sg-topic{font-size:12.5px; font-weight:700; color:var(--text);}

  .advice{background:linear-gradient(145deg,#1C2536,#171E27); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px;}
  .advice .hdr{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .advice .hdr .ic{font-size:16px;} .advice .hdr .t{font-size:12px; font-weight:800; letter-spacing:.04em; color:var(--gold); text-transform:uppercase;}
  .advice p{margin:0 0 6px; font-size:13px; line-height:1.55; color:#D7DEE8;} .advice p:last-child{margin-bottom:0;}

  .card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px;}
  .card h3{margin:0 0 12px; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim);}
  .rowbtns{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .rowbtns .navbtn{background:var(--panel2); border:1px solid var(--border); color:var(--text); width:30px;height:30px;border-radius:9px; font-size:14px; cursor:pointer;}
  .rowbtns .lbl{font-family:var(--mono); font-weight:700; font-size:13.5px;}

  .weekbars{display:flex; align-items:flex-end; gap:8px; height:130px; padding:0 4px;}
  .wbar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .wbar-track{width:100%; max-width:26px; height:100px; background:var(--panel2); border-radius:8px; display:flex; align-items:flex-end; overflow:hidden;}
  .wbar-fill{width:100%; border-radius:8px 8px 0 0; background:linear-gradient(180deg,var(--teal),#1a8f6f); transition:height .5s cubic-bezier(.2,.9,.3,1);}
  .wbar-fill.today{background:linear-gradient(180deg,var(--gold),#c99a2e);}
  .wbar-fill.rest{background:linear-gradient(180deg,var(--teal),#1a8f6f);}
  .wbar-day{font-size:9.5px; color:var(--dim); font-family:var(--mono);} .wbar-date{font-size:9px; color:var(--dim2);}

  .catbar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;} .catbar-row:last-child{margin-bottom:0;}
  .catbar-ic{width:20px; text-align:center; font-size:13px;}
  .catbar-name{font-size:11.5px; color:var(--dim); width:74px; flex-shrink:0;}
  .catbar-track{flex:1; height:9px; border-radius:6px; background:var(--panel2); overflow:hidden;}
  .catbar-fill{height:100%; border-radius:6px; transition:width .5s;}
  .catbar-pct{font-family:var(--mono); font-size:11px; width:34px; text-align:right; color:var(--dim);}

  .calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .calhead{font-size:9.5px; color:var(--dim2); text-align:center; font-family:var(--mono); padding-bottom:2px;}
  .calcell{aspect-ratio:1; border-radius:7px; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-family:var(--mono); color:var(--dim); position:relative; background:var(--panel2); border:1px solid transparent;}
  .calcell.today{border-color:var(--gold); color:var(--text); font-weight:800;} .calcell.empty{background:transparent;}

  .yearbars{display:flex; align-items:flex-end; gap:5px; height:120px;}
  .ybar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end;}
  .ybar-track{width:100%; height:88px; background:var(--panel2); border-radius:5px; display:flex; align-items:flex-end; overflow:hidden;}
  .ybar-fill{width:100%; border-radius:5px 5px 0 0; background:linear-gradient(180deg,var(--blue),#2568b0);}
  .ybar-lbl{font-size:8px; color:var(--dim2); font-family:var(--mono);}

  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .stat{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:12px 14px;}
  .stat .v{font-family:var(--mono); font-weight:800; font-size:20px;} .stat .l{font-size:10px; color:var(--dim); margin-top:2px;}

  .badgegrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .badge{background:var(--panel2); border:1px solid var(--border); border-radius:14px; padding:12px 6px;
    display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; opacity:.35;}
  .badge.earned{opacity:1; background:linear-gradient(150deg,#26314A,#1B2230); border-color:#3E4F70;}
  .badge .ic{font-size:22px;} .badge .t{font-size:9px; color:var(--dim); line-height:1.3;} .badge.earned .t{color:var(--text); font-weight:600;}

  .method-cat-title{font-size:12px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:.04em; margin:18px 0 10px;}
  .method-cat-title:first-child{margin-top:0;}
  .method-card{display:flex; gap:10px; align-items:flex-start; background:var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:12px 12px; margin-bottom:8px; cursor:pointer;}
  .method-card.selected{border-color:var(--teal); background:linear-gradient(145deg,#16241f,#171e27);}
  .method-chk{width:22px;height:22px;border-radius:7px; border:2px solid var(--dim2); flex-shrink:0; margin-top:1px;
    display:flex;align-items:center;justify-content:center;}
  .method-card.selected .method-chk{background:var(--teal); border-color:var(--teal);}
  .method-chk svg{width:12px;height:12px; opacity:0;}
  .method-card.selected .method-chk svg{opacity:1;}
  .method-body{flex:1; min-width:0;}
  .method-name{font-size:13px; font-weight:700; color:var(--text);}
  .method-desc{font-size:11.3px; color:var(--dim); margin-top:3px; line-height:1.4;}
  .method-link{font-size:10.5px; color:var(--gold); text-decoration:none; margin-top:5px; display:inline-block; font-weight:600;}
  .method-reason{font-size:10.5px; color:var(--teal); margin-top:6px; font-weight:600; display:flex; align-items:flex-start; gap:5px; line-height:1.4;}
  .method-reason .ic{flex-shrink:0;}
  .metrics-empty-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:28px 20px; text-align:center;}
  .metrics-empty-card .ic{font-size:34px; margin-bottom:10px;}
  .metrics-empty-card .t{font-size:13.5px; font-weight:700; margin-bottom:6px;}
  .metrics-empty-card .d{font-size:11.5px; color:var(--dim); line-height:1.6; max-width:280px; margin:0 auto 16px;}

  #navbar{display:none;}
  #navbar-inner{width:100%; max-width:460px; display:flex;}
  .navitem{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 8px;
    background:none; border:none; color:var(--dim2); cursor:pointer;}
  .navitem .ic{font-size:18px;} .navitem .t{font-size:9.5px; font-weight:700;} .navitem.active{color:var(--gold);}

  /* ============ HUB HOME ============ */
  .hub-hero{margin-bottom:4px;}
  .hub-hero-title{font-size:19px; font-weight:800;}
  .hub-hero-sub{font-size:12px; color:var(--dim); margin-top:2px;}
  .hub-grid{margin-top:18px;}
  .menu-card{background:var(--panel); border:1px solid var(--border); border-radius:22px; overflow:hidden;
    box-shadow:0 10px 24px rgba(0,0,0,0.22);}
  .menu-card-heading{display:flex; align-items:center; gap:8px; padding:14px 18px 4px; font-size:10.5px; font-weight:700;
    letter-spacing:.12em; text-transform:uppercase; color:var(--dim2);}
  .menu-card-heading::after{content:''; flex:1; height:1px; background:var(--border);}
  .menu-item{position:relative; display:flex; align-items:center; gap:14px; padding:15px 18px; cursor:pointer; transition:background .15s ease;}
  .menu-item:active{background:var(--panel2);}
  .menu-item + .menu-item{border-top:1px dashed var(--border);}
  .menu-item-photo-img{width:60px; height:60px; border-radius:16px; overflow:hidden; flex-shrink:0; display:block;
    box-shadow:0 6px 14px rgba(0,0,0,0.3);}
  .menu-item-photo-img svg{display:block; width:100%; height:100%;}
  .menu-item-body{flex:1; min-width:0;}
  .menu-item-title{font-family:var(--sans); font-size:16px; font-weight:800; letter-spacing:.005em; color:var(--text);}
  .menu-item-sub{font-size:10.5px; color:var(--dim); margin-top:4px; line-height:1.5;}
  .menu-item-stat{font-family:var(--mono); font-weight:800; font-size:15px; text-align:right; flex-shrink:0; color:var(--gold);}
  .menu-item-stat span{display:block; font-family:var(--sans); font-weight:600; font-size:8.5px; color:var(--dim); text-transform:uppercase; letter-spacing:.03em; margin-top:2px;}
  .hub-profile-link{display:flex; align-items:center; justify-content:space-between; margin-top:18px; padding:14px 16px;
    background:var(--panel); border:1px solid var(--border); border-radius:14px; font-size:12.5px; font-weight:700; color:var(--text); cursor:pointer;}
  .hub-profile-link span{color:var(--dim); font-weight:600;}
  .hub-hero{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
  .hub-hero-text{min-width:0;}
  .top-banner{width:calc(100% + 32px); margin:-16px -16px 16px; background:var(--panel); overflow:hidden;
    border-radius:0 0 22px 22px; box-shadow:0 6px 18px rgba(0,0,0,0.22);}

  .icon-svg svg{width:19px; height:19px; display:block;}

  .track-hud-bar{height:7px; background:var(--panel2); border-radius:5px; margin-top:10px; overflow:hidden;}
  .track-hud-fill{height:100%; border-radius:5px; transition:width .5s cubic-bezier(.2,.9,.3,1);}

  .kh-photo{display:block; width:100%; height:100%;}
  .kh-photo svg{width:100%; height:100%; display:block;}

  .loading{display:flex; align-items:center; justify-content:center; height:60vh; color:var(--dim); font-size:13px;}

  #toast-root{position:fixed; top:0; left:0; right:0; display:flex; flex-direction:column; align-items:center;
    z-index:999; pointer-events:none; padding-top:calc(10px + env(safe-area-inset-top));}
  .toast{pointer-events:auto; max-width:400px; width:90%; background:linear-gradient(135deg,#2a2210,#1a1508);
    border:1px solid #6b5620; border-radius:16px; padding:14px 16px; margin-top:8px;
    display:flex; align-items:center; gap:12px; box-shadow:0 10px 40px rgba(0,0,0,.5);
    animation: toastIn .35s cubic-bezier(.2,.9,.3,1), toastOut .4s ease 2.6s forwards;}
  @keyframes toastIn{from{transform:translateY(-30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  @keyframes toastOut{to{transform:translateY(-20px); opacity:0;}}
  .toast .tic{font-size:28px;} .toast .tt{font-size:13px; font-weight:800; color:var(--gold);} .toast .ts{font-size:11.5px; color:#D7C88E; margin-top:2px;}

  #popup-root{position:fixed; inset:0; z-index:1000; display:none; align-items:center; justify-content:center; padding:24px;}

  .popup-card .pic{font-size:38px; margin-bottom:8px;}
  .popup-card .pt{font-size:15px; font-weight:800; margin-bottom:6px;}
  .popup-card .pm{font-size:12.5px; color:#C9D2DE; line-height:1.5; margin-bottom:16px;}

    font-weight:800; font-size:13px; padding:11px 20px; border-radius:12px; width:100%; cursor:pointer;}
  .popup-card.late .pic{color:var(--red);}

  #avatar-modal{position:fixed; inset:0; z-index:1001; display:none; align-items:flex-end; justify-content:center;}
  #avatar-modal.show{display:flex;}
  .avatar-modal-backdrop{position:absolute; inset:0; background:rgba(6,8,12,0.72); backdrop-filter:blur(3px);}
  .avatar-modal-card{position:relative; width:100%; max-width:460px; background:linear-gradient(160deg,#1c2536,#141a22);

  .avatar-upload-btn{background:linear-gradient(90deg,var(--gold),#FFE08A); color:#0E1218; border:none;}
  .avatar-reset-btn{background:var(--panel2); color:var(--dim);}

  .kh-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .kh-cat-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:12px;
    display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; text-align:center;}
  .kh-cat-card .ic{width:100%; aspect-ratio:1.6/1; border-radius:12px; overflow:hidden;}
  .kh-cat-card .lbl{font-size:12.5px; font-weight:700;}
  .kh-cat-card .cnt{font-size:10.5px; color:var(--dim); font-family:var(--mono);}
  .kh-backrow{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .kh-backbtn{width:34px;height:34px;border-radius:10px; background:var(--panel2); border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center; font-size:16px; cursor:pointer; flex-shrink:0;}
  .kh-backrow .title{font-size:15px; font-weight:800; flex:1;}
  .kh-refcard{background:linear-gradient(135deg, rgba(8,145,178,0.15), rgba(8,145,178,0.04));
    border:1px solid rgba(8,145,178,0.4); border-radius:14px; padding:14px; margin-bottom:14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; text-decoration:none; color:var(--text);}
  .kh-refcard .t1{font-size:13px; font-weight:700;} .kh-refcard .t2{font-size:10.5px; color:var(--dim); margin-top:2px;}
  .kh-add-btn{width:100%; padding:12px; border-radius:12px; font-size:13px; font-weight:700; margin-bottom:14px;
    cursor:pointer; border:none; background:linear-gradient(90deg,var(--gold),#FFE08A); color:#0E1208;}
  .kh-note-item{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px;
    margin-bottom:10px; cursor:pointer; position:relative;}
  .kh-note-item .t{font-size:13.5px; font-weight:700; padding-right:24px;}
  .kh-note-item .c{font-size:11.5px; color:var(--dim); margin-top:5px; line-height:1.5; white-space:pre-wrap;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
  .kh-note-item .d{font-size:10px; color:var(--dim2); margin-top:6px; font-family:var(--mono);}
  .kh-note-del{position:absolute; top:12px; right:12px; width:22px;height:22px; border-radius:50%;
    background:var(--panel2); border:1px solid var(--border); color:var(--red); font-size:12px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .kh-empty{text-align:center; color:var(--dim); font-size:12px; padding:30px 10px;}
  textarea.form-input{min-height:120px; line-height:1.5;}
</style>
</head>

// ================= BODY METRICS (WHO Asia-Pacific BMI + Mifflin-St Jeor BMR) =================
const ACTIVITY_FACTORS = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9};
const ACTIVITY_LABELS = {
  sedentary:'Ít vận động (ngồi nhiều)', light:'Vận động nhẹ (1-3 buổi/tuần)',
  moderate:'Vận động vừa (3-5 buổi/tuần)', active:'Vận động nhiều (6-7 buổi/tuần)',
  very_active:'Vận động rất nhiều (2 buổi/ngày)'
};
function bmiValue(w,h){ if(!w||!h) return null; const m=h/100; return w/(m*m); }
function bmiCategoryAsia(bmi){
  if(bmi==null) return null;
  if(bmi<18.5) return {label:'Thiếu cân', hex:'#4FA8FF'};
  if(bmi<23)   return {label:'Bình thường', hex:'#2CDBA8'};
  if(bmi<25)   return {label:'Thừa cân (nguy cơ)', hex:'#FF8A3D'};
  return {label:'Béo phì', hex:'#FF5A6E'};
}
function bmrValue(p){
  if(!p || !p.weight || !p.height || !p.age) return null;
  const base = 10*p.weight + 6.25*p.height - 5*p.age;
  return p.gender==='nu' ? base-161 : base+5;
}
function tdeeValue(p){ const bmr=bmrValue(p); if(bmr==null) return null; return bmr*(ACTIVITY_FACTORS[p.activity]||1.55); }
function maxHRValue(age){ return age ? Math.round(208-0.7*age) : null; }
function mafHRValue(age){ return age ? Math.round(180-age) : null; }

function pad(n){ return n<10 ? '0'+n : ''+n; }
function toKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayKey(){ return toKey(new Date()); }
function parseKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function addMinutes(baseDate,hh,mm,dur){ const d=new Date(baseDate); d.setHours(hh,mm,0,0); return new Date(d.getTime()+dur*60000); }
function fmtHM(d){ return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtDateVN(d){ return WD[d.getDay()]+', '+pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function dayOfYear(d){ const start=new Date(d.getFullYear(),0,0); return Math.floor((d-start)/86400000); }

function pickMethodForCategory(cat, dateObj){
  const catalog = METHODS[cat] || [];
  if(catalog.length===0) return null;
  const hasSelection = SETTINGS.methods && Object.keys(SETTINGS.methods).some(id=>SETTINGS.methods[id] && catalog.some(m=>m.id===id));
  let pool = hasSelection ? catalog.filter(m=>SETTINGS.methods[m.id]) : catalog.slice();
  if(pool.length===0) pool = catalog.slice();
  if(cat==='the_luc' && profileComplete(SETTINGS.profile)){
    const bmi = bmiValue(SETTINGS.profile.weight, SETTINGS.profile.height);
    if(bmi>=23){
      const gentle = pool.filter(m=>m.id==='maf'||m.id==='run_walk'||m.id==='full_body'||m.id==='c25k');
      if(gentle.length) pool = gentle;
    }
  }
  const yKey = toKey(addDays(dateObj,-1));
  const yesterdayPick = LOG[yKey] && LOG[yKey].methodPicks && LOG[yKey].methodPicks[cat];
  let idx = dayOfYear(dateObj) % pool.length;
  if(pool.length>1 && yesterdayPick && pool[idx].id===yesterdayPick){ idx = (idx+1)%pool.length; }
  return pool[idx];

function dayRecord(key){ return LOG[key] || {tasks:{}}; }
function dayPlanInfo(key){
  const plan = getPlanForKey(key); const rec = dayRecord(key);
  const done = plan.filter(t=>rec.tasks[t.id]).length;
  return {plan, rec, done, total:plan.length};
}
const REST_DAY_XP = 30;
function dayPct(key){ if(isDayOff(key)) return 100; const {done,total} = dayPlanInfo(key); return total>0 ? Math.round(done/total*100) : 0; }
function dayXP(key){ if(isDayOff(key)) return REST_DAY_XP; const {done,total} = dayPlanInfo(key); return total>0 ? done*XP_PER_TASK + (done===total?PERFECT_BONUS:0) : 0; }
function dayMaxXP(key){ if(isDayOff(key)) return REST_DAY_XP; const {total} = dayPlanInfo(key); return total>0 ? total*XP_PER_TASK+PERFECT_BONUS : 0; }
function catInfo(key, cat){
  const {plan, rec} = dayPlanInfo(key); const list = plan.filter(t=>t.cat===cat);
  return {done:list.filter(t=>rec.tasks[t.id]).length, total:list.length};
}
function totalXP(){ return Object.keys(LOG).reduce((s,k)=> s + dayXP(k), 0); }
function levelInfo(){ const xp = totalXP(); return {lvl:Math.floor(xp/500)+1, cur:xp%500, next:500, xp}; }
function computeStreak(){
  let d = new Date(); let key = toKey(d);
  if(!isDayOff(key)){
    const {total:t0, done:d0} = dayPlanInfo(key);
    if(t0===0 || d0===0){ d = addDays(d,-1); key = toKey(d); }
  }
  let streak = 0;
  while(LOG[key] && dayPct(key) >= 75){ streak++; d = addDays(d,-1); key = toKey(d); }
  return streak;
}
function allTrackedDates(){ return Object.keys(LOG).sort(); }

// ================= TRACK (gamified XP per section) =================
const TRACK_CATS = { schedule:['the_luc','chuyen_mon','ky_luat','giai_tri'], english:['tieng_anh'] };
const TRACK_META = {

  english:{ title:'Học tiếng Anh', hex:'#4FA8FF', hex2:'#7C6CF0' }
};
function trackTasksForDay(key, track){ const {plan} = dayPlanInfo(key); return plan.filter(t=>TRACK_CATS[track].includes(t.cat)); }
function dayInfoTrack(key, track){
  const list = trackTasksForDay(key, track); const rec = dayRecord(key);
  return { total:list.length, done:list.filter(t=>rec.tasks[t.id]).length };
}
function dayPctTrack(key, track){ if(isDayOff(key)) return 100; const {done,total} = dayInfoTrack(key,track); return total>0 ? Math.round(done/total*100) : 0; }
function dayXPTrack(key, track){ if(isDayOff(key)) return track==='schedule'?REST_DAY_XP:0; const {done,total} = dayInfoTrack(key,track); return total>0 ? done*XP_PER_TASK + (done===total?PERFECT_BONUS:0) : 0; }
function dayMaxXPTrack(key, track){ if(isDayOff(key)) return track==='schedule'?REST_DAY_XP:0; const {total} = dayInfoTrack(key,track); return total>0 ? total*XP_PER_TASK+PERFECT_BONUS : 0; }
function totalXPTrack(track){ return Object.keys(LOG).reduce((s,k)=> s + dayXPTrack(k,track), 0); }
function levelInfoTrack(track){ const xp = totalXPTrack(track); return {lvl:Math.floor(xp/500)+1, cur:xp%500, next:500, xp}; }
function computeStreakTrack(track){
  let d = new Date(); let key = toKey(d);
  if(!isDayOff(key)){
    const {total, done} = dayInfoTrack(key, track);
    if(total===0 || done===0){ d = addDays(d,-1); key = toKey(d); }
  }
  let streak = 0;
  while(LOG[key] && dayPctTrack(key,track) >= 75){ streak++; d = addDays(d,-1); key = toKey(d); }
  return streak;
}
function computeBadgesTrack(track){
  const dates = allTrackedDates(); const streak = computeStreakTrack(track);
  let totalPerfect=0, totalDone=0;
  dates.forEach(k=>{ if(dayPctTrack(k,track)===100) totalPerfect++; totalDone += dayInfoTrack(k,track).done; });
  const lvl = levelInfoTrack(track).lvl;
  const doneLabel = track==='schedule' ? 'buổi tập luyện' : 'buổi học tiếng Anh';
  return [
    {icon:'🔥', label:'Chuỗi 7 ngày', earned: streak>=7},
    {icon:'⚡', label:'Chuỗi 30 ngày', earned: streak>=30},
    {icon:'🏅', label:'10 ngày hoàn hảo', earned: totalPerfect>=10},
    {icon:'🎯', label:`50 ${doneLabel}`, earned: totalDone>=50},
    {icon:'📅', label:'30 ngày theo dõi', earned: dates.length>=30},
    {icon:'👑', label:'Đạt Level 5', earned: lvl>=5},
  ];
}
function buildAdviceTrack(dateKeys, track){
  const tracked = dateKeys.filter(k=>LOG[k] && dayInfoTrack(k,track).total>0);
  if(tracked.length===0) return ["Chưa có dữ liệu trong giai đoạn này. Bắt đầu đánh dấu hoàn thành để mình phân tích cho bạn nhé!"];
  let trendMsg='';
  if(tracked.length>=4){
    const half=Math.floor(tracked.length/2);
    const avg = arr=>arr.reduce((s,k)=>s+dayPctTrack(k,track),0)/arr.length;
    const a1=avg(tracked.slice(0,half)), a2=avg(tracked.slice(half));
    if(a2-a1>=8) trendMsg = `Xu hướng đang <b>cải thiện rõ rệt</b> — từ ${Math.round(a1)}% lên ${Math.round(a2)}%. Cứ giữ nhịp độ này!`;
    else if(a1-a2>=8) trendMsg = `Hiệu suất đang <b>giảm nhẹ</b> (${Math.round(a1)}% → ${Math.round(a2)}%). Xem lại giờ giấc hoặc mức tải có đang quá sức không.`;
    else trendMsg = `Hiệu suất khá <b>ổn định</b> quanh mức ${Math.round(a2)}%.`;
  }
  const avgPct = Math.round(tracked.reduce((s,k)=>s+dayPctTrack(k,track),0)/tracked.length);
  const streak = computeStreakTrack(track);
  const restCount = track==='schedule' ? tracked.filter(k=>isDayOff(k)).length : 0;
  const msgs = [`Tỷ lệ hoàn thành trung bình: <b>${avgPct}%</b> trên ${tracked.length} ngày có dữ liệu${restCount>0?` (trong đó có <b>${restCount} ngày nghỉ chủ động</b>, được tính là hoàn thành)`:''}. ${trendMsg}`];
  if(streak>=3) msgs.push(`🔥 Đang giữ chuỗi <b>${streak} ngày liên tiếp</b> — đừng để đứt quãng nhé!`);
  else if(tracked.length>0) msgs.push(`Chuỗi ngày liên tiếp hiện tại là 0. Hoàn thành hôm nay để bắt đầu chuỗi mới!`);
  return msgs;
}

// ================= STORAGE (cloud + localStorage/memory fallback) =================
let STORAGE_MODE='unknown'; const MEM={};
function hasCloudStorage(){ return typeof window.storage!=='undefined' && window.storage && typeof window.storage.get==='function' && typeof window.storage.set==='function'; }
function withTimeout(promise, ms){
  return new Promise((resolve,reject)=>{
    let done=false; const timer=setTimeout(()=>{ if(!done){done=true; reject(new Error('timeout'));} }, ms);
    promise.then(v=>{ if(!done){done=true; clearTimeout(timer); resolve(v);} }).catch(e=>{ if(!done){done=true; clearTimeout(timer); reject(e);} });
  });
}
async function storageGet(key){
  if(hasCloudStorage()){
    try{ const res = await withTimeout(window.storage.get(key,false), 2500); STORAGE_MODE='cloud'; return (res&&res.value)?res.value:null; }catch(e){}
  }
  try{ const v = localStorage.getItem('rlmn_'+key); STORAGE_MODE=(STORAGE_MODE==='cloud')?'cloud':'local'; return v; }
  catch(e){ STORAGE_MODE='memory'; return (key in MEM)?MEM[key]:null; }
}
async function storageSet(key, value){
  let cloudOk=false;
  if(hasCloudStorage()){ try{ await withTimeout(window.storage.set(key,value,false), 2500); cloudOk=true; STORAGE_MODE='cloud'; }catch(e){} }
  if(!cloudOk){ try{ localStorage.setItem('rlmn_'+key,value); if(STORAGE_MODE!=='cloud') STORAGE_MODE='local'; } catch(e){ MEM[key]=value; STORAGE_MODE='memory'; } }
}

async function onDriveTokenResponse(resp){
  if(!resp || resp.error){ if(wasDriveConnected()) markDriveConnected(false); renderContent(); return; }
  const wasConnected = !!driveAccessToken;
  driveAccessToken = resp.access_token;
  driveTokenExpiry = Date.now() + ((resp.expires_in||3500)*1000);
  markDriveConnected(true);
  scheduleSilentRefresh();
  try{ await fetchDriveUserEmail(); }catch(e){}
  if(!wasConnected){
    driveSyncing = true; renderContent();

function scheduleSilentRefresh(){
  clearTimeout(driveSilentTimer);

async function driveFetch(url, options={}){
  if(!driveAccessToken) throw new Error('no-token');
  const headers = Object.assign({}, options.headers||{}, {Authorization: 'Bearer '+driveAccessToken});
  const res = await fetch(url, Object.assign({}, options, {headers}));
  if(res.status===401){ driveAccessToken=null; throw new Error('unauthorized'); }
  return res;
}
async function fetchDriveUserEmail(){
  try{
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+driveAccessToken}});

}
async function ensureDriveFile(){
  if(driveFileId) return driveFileId;
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const listRes = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`);
  const listData = await listRes.json();
  if(listData.files && listData.files.length){ driveFileId = listData.files[0].id; return driveFileId; }
  const metadata = {name: DRIVE_FILE_NAME, mimeType:'application/json'};
  const boundary = '-------rlmnhub' + Date.now();
  const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n{}\r\n--${boundary}--`;
  const createRes = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method:'POST',
    headers:{'Content-Type': `multipart/related; boundary=${boundary}`},
    body
  });
  const createData = await createRes.json();
  driveFileId = createData.id;
  return driveFileId;
}

async function pullFromDrive(){

  if(!res.ok) return;

}

// ================= ADVICE ENGINE =================
function buildAdvice(dateKeys){
  const tracked = dateKeys.filter(k=>LOG[k] && dayPlanInfo(k).total>0);
  if(tracked.length===0) return ["Chưa có dữ liệu trong giai đoạn này. Bắt đầu đánh dấu hoàn thành các mục hôm nay để mình phân tích cho bạn nhé!"];
  const catRate = {};
  Object.keys(CATS).forEach(cat=>{
    let done=0,total=0; tracked.forEach(k=>{ if(isDayOff(k)) return; const ci=catInfo(k,cat); done+=ci.done; total+=ci.total; });
    catRate[cat] = total>0 ? done/total : -1;
  });
  const validCats = Object.keys(catRate).filter(c=>catRate[c]>=0);
  const sortedCats = validCats.sort((a,b)=>catRate[a]-catRate[b]);
  const weakest = sortedCats[0]; const strongest = sortedCats[sortedCats.length-1];
  let trendMsg='';
  if(tracked.length>=4){
    const half=Math.floor(tracked.length/2);
    const avg = arr=>arr.reduce((s,k)=>s+dayPct(k),0)/arr.length;
    const a1=avg(tracked.slice(0,half)), a2=avg(tracked.slice(half));
    if(a2-a1>=8) trendMsg = `Xu hướng đang <b>cải thiện rõ rệt</b> — từ ${Math.round(a1)}% lên ${Math.round(a2)}%. Cứ giữ nhịp độ này!`;
    else if(a1-a2>=8) trendMsg = `Hiệu suất đang <b>giảm nhẹ</b> (${Math.round(a1)}% → ${Math.round(a2)}%). Xem lại giờ giấc hoặc mức tải có đang quá sức không.`;
    else trendMsg = `Hiệu suất khá <b>ổn định</b> quanh mức ${Math.round(a2)}%.`;
  }
  const avgPct = Math.round(tracked.reduce((s,k)=>s+dayPct(k),0)/tracked.length);
  const streak = computeStreak();
  const restCount = tracked.filter(k=>isDayOff(k)).length;
  const msgs = [`Tỷ lệ hoàn thành trung bình: <b>${avgPct}%</b> trên ${tracked.length} ngày có dữ liệu${restCount>0?` (trong đó có <b>${restCount} ngày nghỉ chủ động</b>, được tính là hoàn thành)`:''}. ${trendMsg}`];
  if(weakest && catRate[weakest] < 0.6){
    let tip='';
    if(weakest==='the_luc') tip='thử rút ngắn buổi chạy/tập hoặc đổi khung giờ cho phù hợp năng lượng buổi sáng.';
    else if(weakest==='tieng_anh') tip='thử gộp bớt 1 buổi luyện nói/shadowing ngắn hơn thay vì bỏ hẳn.';
    else if(weakest==='chuyen_mon') tip='thử đặt mục tiêu nhỏ hơn (15-20 phút) để dễ duy trì mỗi ngày.';
    else tip='thử đặt báo thức nhắc giờ ngủ trước 15 phút để tạo thói quen.';
    msgs.push(`Nhóm <b>${CATS[weakest].label}</b> đang là điểm yếu nhất (${Math.round(catRate[weakest]*100)}%). Gợi ý: ${tip}`);
  } else if(weakest){
    msgs.push(`Tất cả các nhóm đều duy trì khá tốt (thấp nhất: <b>${CATS[weakest].label}</b> ${Math.round(catRate[weakest]*100)}%). Mạnh nhất: <b>${CATS[strongest].label}</b> (${Math.round(catRate[strongest]*100)}%).`);
  }
  if(streak>=3) msgs.push(`🔥 Đang giữ chuỗi <b>${streak} ngày</b> liên tiếp đạt trên 75%. Đừng để đứt mạch nhé!`);
  else if(streak===0) msgs.push(`Chưa có chuỗi ngày liên tiếp nào — bắt đầu lại từ hôm nay, chỉ cần đạt 75% mỗi ngày là được tính!`);
  const p = SETTINGS.profile;
  if(profileComplete(p)){
    const bmi = bmiValue(p.weight, p.height); const cat = bmiCategoryAsia(bmi);
    const theLucRate = catRate['the_luc'];
    if(theLucRate>=0){
      if(cat.label.indexOf('Thừa cân')===0 || cat.label==='Béo phì'){
        if(theLucRate<0.6) msgs.push(`Với BMI ${bmi.toFixed(1)} (${cat.label.toLowerCase()}) và tỷ lệ hoàn thành Thể lực mới ${Math.round(theLucRate*100)}%, ưu tiên tăng đều đặn các buổi chạy nhẹ nhàng (MAF/Run-Walk) sẽ hiệu quả hơn là dồn cường độ cao — bền vững quan trọng hơn nhanh.`);
        else msgs.push(`Tỷ lệ hoàn thành Thể lực ${Math.round(theLucRate*100)}% đang tốt — với BMI ${bmi.toFixed(1)}, tiếp tục nhịp độ vừa phải này để giảm cân an toàn (khoảng 0.5kg/tuần là hợp lý).`);
      } else if(cat.label==='Thiếu cân' && theLucRate<0.6){
        msgs.push(`BMI ${bmi.toFixed(1)} đang ở mức thiếu cân — nên đảm bảo đủ Thể lực (đặc biệt tập tạ) để xây cơ, tránh giảm cân thêm.`);
      }
    }
    if(p.age>=40 && avgPct<70){
      msgs.push(`Ở độ tuổi ${p.age}, cơ thể cần thời gian phục hồi lâu hơn — nếu thấy khó duy trì ${avgPct}%, thử giảm cường độ thay vì giảm tần suất.`);
    }
  }
  return msgs;
}

const AVATAR_EMOJIS = ['🌱','🔥','⚔️','🛡️','🐉','👑','🌟','🦁','🐯','🚀','🎯','💪','🧠','🎨','🎮','⭐','🍀','🦄','🐨','🐼','🦊','🌈','☀️','🌙'];

function openAvatarModal(){ renderAvatarModal(); document.getElementById('avatar-modal').classList.add('show'); }
function closeAvatarModal(){ document.getElementById('avatar-modal').classList.remove('show'); }
function handleAvatarFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const size = 240;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      SETTINGS.avatarType = 'image'; SETTINGS.avatarImage = dataUrl; SETTINGS.avatarEmoji = null;
      saveSettings(); closeAvatarModal(); renderHUD();
    };
    img.onerror = ()=>{ alert('Không đọc được ảnh này, thử ảnh khác nhé.'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('avatar-file-input').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  handleAvatarFile(file);
  e.target.value = '';
});
function handleBannerFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const w = 900, h = 320;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(w/img.width, h/img.height);
      const dw = img.width*scale, dh = img.height*scale;
      ctx.drawImage(img, (w-dw)/2, (h-dh)/2, dw, dh);
      SETTINGS.bannerImage = canvas.toDataURL('image/jpeg', 0.82);
      saveSettings(); renderContent();
    };
    img.onerror = ()=>{ alert('Không đọc được ảnh này, thử ảnh khác nhé.'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('banner-file-input').addEventListener('change', (e)=>{
  const file = e.target.files && e.target.files[0];
  handleBannerFile(file);
  e.target.value = '';
});
document.getElementById('avatar-modal').addEventListener('click', (e)=>{
  if(e.target.closest('[data-action="avatar-close"]')){ closeAvatarModal(); return; }
  const emojiEl = e.target.closest('[data-action="avatar-pick-emoji"]');

    saveSettings(); closeAvatarModal(); renderHUD(); return;

  if(e.target.closest('[data-action="avatar-pick-photo"]')){ document.getElementById('avatar-file-input').click(); return; }
  if(e.target.closest('[data-action="avatar-reset"]')){
    SETTINGS.avatarType = 'auto'; SETTINGS.avatarEmoji = null; SETTINGS.avatarImage = null;

  }
});

function khNotes(catId){ return KIEMHANG[catId] || []; }
function khGenId(){ return 'kh'+Date.now()+Math.random().toString(36).slice(2,7); }
function khSaveNote(catId, editId, title, content){
  if(!KIEMHANG[catId]) KIEMHANG[catId] = [];
  const now = Date.now();
  if(editId){
    const idx = KIEMHANG[catId].findIndex(n=>n.id===editId);
    if(idx>=0){ KIEMHANG[catId][idx].title=title; KIEMHANG[catId][idx].content=content; KIEMHANG[catId][idx].updatedAt=now; }
  } else {
    KIEMHANG[catId].unshift({id:khGenId(), title, content, updatedAt:now});
  }
  saveKiemHang();
}
function khDeleteNote(catId, id){
  if(!KIEMHANG[catId]) return;
  KIEMHANG[catId] = KIEMHANG[catId].filter(n=>n.id!==id);
  saveKiemHang();
}
function khFmtDate(ts){
  try{ const d = new Date(ts); return d.toLocaleDateString('vi-VN')+' '+d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; }
}

function renderRingsSVG(key, size){
  const {plan} = dayPlanInfo(key);
  const catsPresent = Object.keys(CATS).filter(c=> plan.some(t=>t.cat===c));
  const cx=size/2, cy=size/2, gap=15; let radius = size/2 - 10;
  let svg = `<svg id="rings-svg" viewBox="0 0 ${size} ${size}">`;
  catsPresent.forEach((cat,i)=>{
    const r = radius - i*gap; const circ = 2*Math.PI*r;
    const ci = catInfo(key,cat); const pct = ci.total>0 ? ci.done/ci.total : 0;
    const offset = circ*(1-pct);
    svg += `<circle class="ring-bg" cx="${cx}" cy="${cy}" r="${r}"/>`;
    svg += `<circle class="ring-fg" cx="${cx}" cy="${cy}" r="${r}" stroke="${CATS[cat].hex}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" transform="rotate(-90 ${cx} ${cy})" data-final="${offset}"/>`;
  });
  const pctTotal = dayPct(key);
  svg += `<g class="ring-center" text-anchor="middle"><text x="${cx}" y="${cy-2}" class="big">${pctTotal}%</text><text x="${cx}" y="${cy+16}" class="small">HOÀN THÀNH</text></g></svg>`;
  return svg;
}

function renderToday(){
  const key = todayKey(); const now = new Date();
  const dayOff = isDayOff(key);

  const toggleRow = `<div class="dayoff-toggle ${dayOff?'active':''}" data-action="toggle-dayoff">
      <span>${dayOff?'🌴':'☀️'}</span><span>${dayOff? 'Hôm nay đang là ngày nghỉ — bấm để quay lại lịch bình thường' : 'Đánh dấu hôm nay là ngày nghỉ, xả stress'}</span>
    </div>`;

  if(dayOff){
    document.getElementById('content').innerHTML = renderSectionBack(svgIcon('calendar')+' Lịch làm việc hàng ngày') + scheduleSubNav() + renderTrackHUD('schedule') + toggleRow + `
      <div class="card rest-day-card" style="text-align:center; padding:36px 20px;">
        <div style="font-size:46px; margin-bottom:12px;">🌴</div>
        <div style="font-size:15px; font-weight:700; margin-bottom:8px;">Hôm nay là ngày nghỉ ngơi</div>
        <div style="font-size:12.5px; color:var(--dim); line-height:1.6; max-width:280px; margin:0 auto;">Không sao cả — nghỉ ngơi, xả stress cũng là một phần quan trọng của hành trình. Ngày này sẽ không tính vào thống kê hoàn thành và không làm đứt chuỗi ngày liên tiếp của bạn.</div>
      </div>`;
    renderNav(); renderHUD();
    return;
  }

  const {plan, rec, done, total} = dayPlanInfo(key);
  const xp = dayXP(key); const maxXp = dayMaxXP(key);
  const catsPresent = Object.keys(CATS).filter(c=> plan.some(t=>t.cat===c));
  const legend = catsPresent.map(cat=>{ const ci=catInfo(key,cat); return `
    <div class="leg-item" style="background:${CATS[cat].hex}22; border:1px solid ${CATS[cat].hex}55; color:${CATS[cat].hex};"><span class="leg-dot" style="background:${CATS[cat].hex}"></span>${CATS[cat].icon} ${CATS[cat].label}: <b>${ci.done}/${ci.total}</b></div>`; }).join('');
  const restBanner = isRestDay(now) ? `<div class="rest-banner">💤 Hôm nay là ngày nghỉ chạy/tập tạ theo lịch mặc định để phục hồi. Tập trung Tiếng Anh &amp; Chuyên môn nhé!</div>` : '';

  const tasksHtml = plan.map(t=>{
    const isDone = !!rec.tasks[t.id];
    const [hh,mm] = t.time.split(':').map(Number);
    const taskTime = new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm);
    const overdue = !isDone && key===todayKey() && now > taskTime && t.kind!=='sleep';
    const isOpen = !!STATE.expanded[t.id];
    const isCustom = t.kind==='custom';
    return `
    <div class="task-wrap ${isDone?'done':''} ${overdue?'overdue':''}">
      <div class="task" data-action="row" data-task="${t.id}">
        <div class="time">${timeRangeLabel(t, now)}</div>
        <div class="catdot" style="background:${CATS[t.cat].hex}"></div>
        <div class="lbl">${t.label}<span class="chev ${isOpen?'open':''}">▸</span></div>
        <div class="chk" data-action="toggle" data-task="${t.id}">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5L20 6.5" stroke="#0E1218" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="rm" data-action="remove-task" data-task="${t.id}" data-custom="${isCustom?'1':'0'}" title="${isCustom?'Xóa việc này':'Ẩn việc này hôm nay'}">✕</div>
      </div>
      <div class="subpanel ${isOpen?'open':''}"><div class="subinner">${isOpen ? renderSubpanel(t, now) : ''}</div></div>
    </div>`;
  }).join('');

  const removedCount = Object.keys((rec.removed)||{}).length;
  const resetHtml = removedCount>0 ? `<button class="reset-today-btn" data-action="reset-today-removed">↺ Đặt lại lịch mặc định hôm nay (${removedCount} việc đã ẩn)</button>` : '';

  const addTaskSection = STATE.addingTask ? renderAddTaskForm() : `<button class="add-task-btn" data-action="open-add-task">+ Thêm việc của riêng bạn</button>`;

  document.getElementById('content').innerHTML = `
    ${renderSectionBack(svgIcon('calendar')+' Lịch làm việc hàng ngày')}
    ${scheduleSubNav()}
    ${renderTrackHUD('schedule')}
    ${toggleRow}
    ${restBanner}
    <div class="ringcard" id="ringcard">${renderRingsSVG(key, 180)}<div class="legend">${legend}</div></div>
    <div class="card" style="text-align:center;">
      <h3 style="margin-bottom:6px;">XP hôm nay</h3>
      <div style="font-family:var(--mono); font-weight:800; font-size:22px; color:var(--gold);">${xp} / ${maxXp}</div>
      <div style="font-size:11px; color:var(--dim); margin-top:2px;">${(total>0 && done===total) ? '🎉 Hoàn hảo! +'+PERFECT_BONUS+' XP thưởng' : 'Hoàn thành 100% để nhận +'+PERFECT_BONUS+' XP thưởng'}</div>
    </div>
    <div class="tasklist">${tasksHtml}</div>
    ${resetHtml}
    ${addTaskSection}
  `;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.ring-fg').forEach(el=>{ el.style.strokeDashoffset = el.getAttribute('data-final'); });
  }));
}

function getMonthMatrix(year,month){
  const first = new Date(year,month,1); const startOffset = (first.getDay()+6)%7;
  const daysInMonth = new Date(year,month+1,0).getDate();
  const cells=[]; for(let i=0;i<startOffset;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);
  return cells;
}
function heatColor(pct){
  if(pct<=0) return 'var(--panel2)'; if(pct<25) return '#4a3d1f'; if(pct<50) return '#7a611f';
  if(pct<75) return '#a8871f'; if(pct<100) return '#d1a824'; return '#FFC94A';
}

function renderYear(track){

function computeBadges(){
  const dates = allTrackedDates(); const streak = computeStreak();
  let totalPerfect=0,totalTieng=0,totalTheLuc=0,totalChuyen=0,totalDays=dates.length;
  dates.forEach(k=>{ if(dayPct(k)===100) totalPerfect++;
    totalTieng+=catInfo(k,'tieng_anh').done; totalTheLuc+=catInfo(k,'the_luc').done; totalChuyen+=catInfo(k,'chuyen_mon').done; });
  return [
    {icon:'🔥', label:'Chuỗi 7 ngày', earned: streak>=7}, {icon:'⚡', label:'Chuỗi 30 ngày', earned: streak>=30},
    {icon:'🏅', label:'10 ngày hoàn hảo', earned: totalPerfect>=10}, {icon:'🗣️', label:'50 buổi tiếng Anh', earned: totalTieng>=50},
    {icon:'💪', label:'30 buổi tập luyện', earned: totalTheLuc>=30}, {icon:'📚', label:'30 buổi chuyên môn', earned: totalChuyen>=30},
    {icon:'📅', label:'30 ngày theo dõi', earned: totalDays>=30}, {icon:'👑', label:'100 ngày theo dõi', earned: totalDays>=100},
    {icon:'🎯', label:'Level 5', earned: levelInfo().lvl>=5},
  ];
}

  const resetEl = e.target.closest('[data-action="reset-today-removed"]');
  if(resetEl){ resetTodayRemoved(); return; }

  const chkEl = e.target.closest('[data-action="toggle"]');
  if(chkEl){
    e.stopPropagation();
    const key = todayKey(); const taskId = chkEl.getAttribute('data-task');
    const wasComplete = dayPct(key)===100;
    toggleTask(key, taskId);
    const nowComplete = dayPct(key)===100;
    if(!wasComplete && nowComplete){
      const rc = document.getElementById('ringcard');
      if(rc){ rc.classList.add('pulse'); setTimeout(()=>rc.classList.remove('pulse'),900); }
    }
    return;
  }
  const rowEl = e.target.closest('[data-action="row"]');
  if(rowEl){ const taskId = rowEl.getAttribute('data-task'); STATE.expanded[taskId] = !STATE.expanded[taskId]; renderContent(); return; }

  const ipaChip = e.target.closest('[data-action="ipa-toggle"]');
  if(ipaChip){
    const sym = ipaChip.getAttribute('data-sym');
    SETTINGS.ipaLearned[sym] = !SETTINGS.ipaLearned[sym];
    saveSettings(); renderContent(); return;
  }
  const levelBtn = e.target.closest('[data-action="set-level"]');
  if(levelBtn){ SETTINGS.speakingLevel = levelBtn.getAttribute('data-level'); saveSettings(); renderContent(); return; }
  const shadowBtn = e.target.closest('[data-action="set-shadow"]');
  if(shadowBtn){ SETTINGS.shadowTopic = shadowBtn.getAttribute('data-topic'); saveSettings(); renderContent(); return; }
  const methodCard = e.target.closest('[data-action="method-toggle"]');
  if(methodCard){
    const mid = methodCard.getAttribute('data-mid');
    SETTINGS.methods[mid] = !SETTINGS.methods[mid];
    saveSettings(); renderContent(); return;
  }
});
document.getElementById('hud').addEventListener('click', (e)=>{
  if(e.target.closest('[data-action="open-avatar"]')) openAvatarModal();
});
document.getElementById('navbar-inner').addEventListener('click',(e)=>{
  const btn = e.target.closest('[data-action="tab"]');
  if(btn){ STATE.tab = btn.getAttribute('data-tab'); renderContent(); }
});

// ================= REMINDERS / IN-APP POPUPS =================
function alreadyNotified(key, flagKey){ return !!(LOG[key] && LOG[key].notified && LOG[key].notified[flagKey]); }
function markNotified(key, flagKey){
  if(!LOG[key]) LOG[key] = {tasks:{}};
  if(!LOG[key].notified) LOG[key].notified = {};
  LOG[key].notified[flagKey] = true;
  saveLog();
}
function checkReminders(){
  const now = new Date(); const key = todayKey();
  if(isDayOff(key)) return;
  const {plan, rec} = dayPlanInfo(key);
  const notifOk = ('Notification' in window) && Notification.permission==='granted';
  plan.forEach(t=>{
    if(rec.tasks[t.id]) return;
    const [hh,mm] = t.time.split(':').map(Number);
    const taskDate = new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0);
    const diffMin = (taskDate-now)/60000;
    const remKey = 'rem_'+t.id;
    if(diffMin<=15 && diffMin>13 && !alreadyNotified(key, remKey)){
      markNotified(key, remKey);
      enqueuePopup('⏰','Sắp đến giờ: '+t.label, 'Bắt đầu lúc '+t.time+' — còn khoảng 15 phút nữa.');
      if(notifOk){ try{ new Notification('⏰ Sắp đến giờ: '+t.label, {body:'Bắt đầu lúc '+t.time, tag:key+'_'+remKey, vibrate:[200,100,200], icon:'icon-192.png'}); }catch(e){} }
    }
    const lateKey = 'late_'+t.id;
    if(t.kind!=='sleep' && diffMin<=-10 && !alreadyNotified(key, lateKey)){
      markNotified(key, lateKey);
      const lateMin = Math.round(-diffMin);
      enqueuePopup('⚠️','Trễ lịch: '+t.label, 'Đã quá giờ '+lateMin+' phút — thực hiện ngay khi có thể nhé!', true);
      if(notifOk){ try{ new Notification('⚠️ Trễ lịch: '+t.label, {body:'Đã quá giờ '+lateMin+' phút', tag:key+'_'+lateKey, vibrate:[300,100,300,100,300], requireInteraction:true, icon:'icon-192.png'}); }catch(e){} }
    }
  });
  if(now.getHours()===21 && now.getMinutes()>=45 && now.getMinutes()<48){
    const sumKey = 'summary';
    if(!alreadyNotified(key, sumKey)){
      markNotified(key, sumKey);
      const incomplete = plan.filter(t=>!rec.tasks[t.id]);
      if(incomplete.length>0){
        enqueuePopup('📋','Tổng kết hôm nay', 'Bạn còn '+incomplete.length+' việc chưa hoàn thành: '+incomplete.map(t=>t.label).join(', '));
        if(notifOk){ try{ new Notification('📋 Tổng kết hôm nay', {body:'Còn '+incomplete.length+' việc chưa xong', vibrate:[200,100,200], requireInteraction:true, icon:'icon-192.png'}); }catch(e){} }
      } else {
        enqueuePopup('🎉','Xuất sắc!', 'Bạn đã hoàn thành tất cả nhiệm vụ hôm nay!');
        if(notifOk){ try{ new Notification('🎉 Xuất sắc!', {body:'Hoàn thành tất cả nhiệm vụ hôm nay!', icon:'icon-192.png'}); }catch(e){} }
      }
    }
  }
}

setTimeout(()=>{
  const c = document.getElementById('content');
  if(c && c.querySelector('.loading')){
    if(!LOG) LOG = {};
    if(!SETTINGS || !SETTINGS.programStart) SETTINGS = Object.assign({programStart: todayKey(), ipaLearned:{}, speakingLevel:'beginner', shadowTopic:'doi_song', methods:Object.assign({},DEFAULT_METHODS)}, SETTINGS||{});
    lastKnownLevel = levelInfo().lvl;
    renderContent();
  }
}, 4000);

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('service-worker.js').catch(e=>console.error('SW reg failed', e)); });
}

(async function init(){
  try{ await loadAll(); }catch(e){ console.error('Init storage error', e); }
  lastKnownLevel = levelInfo().lvl;
  // Luôn mở app ở màn hình đăng nhập trước. Chỉ chuyển sang màn hình chính SAU KHI xác nhận
  // đăng nhập Google thành công (xem onDriveTokenResponse) — kể cả khi trước đó đã từng đăng nhập.
  renderContent();
  initDriveSync();
  setInterval(checkReminders, 20000);
  if(STORAGE_MODE==='local'){ showToast('💾','Đang lưu trên trình duyệt này','Mở app ở trình duyệt/thiết bị khác sẽ không thấy dữ liệu này.'); }
  else if(STORAGE_MODE==='memory'){ showToast('⚠️','Không thể lưu dữ liệu','Trình duyệt chặn lưu trữ — tiến độ sẽ mất khi đóng tab.'); }
  if(!SETTINGS.notifPrompted && ('Notification' in window) && Notification.permission==='default'){
    setTimeout(()=>{ showNotifOnboarding(); }, 1200);
  }
})();

})();
</script>
